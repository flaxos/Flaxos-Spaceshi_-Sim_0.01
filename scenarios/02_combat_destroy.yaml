# Combat Mission: Destroy Enemy Ship
# Engage and destroy a hostile target

name: "Combat: Eliminate Threat"
description: "Destroy the hostile pirate ship"

dt: 0.1

ships:
  - id: "player"
    name: "Rocinante"
    class: "corvette"
    player_controlled: true
    position: {x: 0, y: 0, z: 0}
    velocity: {x: 50, y: 0, z: 0}
    mass: 5000
    systems:
      propulsion:
        max_thrust: 50000
        fuel_level: 10000
        max_fuel: 10000
      sensors:
        passive:
          range: 200000
        active:
          scan_range: 500000
      navigation: {}
      targeting:
        lock_range: 500000.0
      weapons:
        weapons:
          - name: "railgun"
            power_cost: 15
            max_heat: 80
            ammo: 20
          - name: "torpedo"
            power_cost: 10
            max_heat: 100
            ammo: 12
          - name: "missile"
            power_cost: 8
            max_heat: 60
            ammo: 8
          - name: "pdc"
            power_cost: 5
            max_heat: 50
            ammo: 1000
        hardpoints:
          - id: "hp_fwd_1"
            weapon: "railgun"
            mount_type: "fixed"
            position_offset: {x: 20, y: 0, z: 0}
            orientation: {azimuth: 0, elevation: 0}
          - id: "hp_fwd_2"
            weapon: "torpedo"
            mount_type: "fixed"
            position_offset: {x: 18, y: 2, z: 0}
            orientation: {azimuth: 0, elevation: 0}
          - id: "hp_fwd_3"
            weapon: "missile"
            mount_type: "fixed"
            position_offset: {x: 18, y: -2, z: 0}
            orientation: {azimuth: 0, elevation: 0}
          - id: "hp_top_1"
            weapon: "pdc"
            mount_type: "turret"
            position_offset: {x: 5, y: 10, z: 0}
          - id: "hp_bot_1"
            weapon: "pdc"
            mount_type: "turret"
            position_offset: {x: 5, y: -10, z: 0}
      combat:
        railguns: 1
        pdcs: 2
        torpedoes: 1
        torpedo_capacity: 12
        missiles: 1
        missile_capacity: 8

  - id: "pirate01"
    name: "Black Pearl"
    class: "frigate"
    faction: "pirates"
    ai_enabled: true
    position: {x: 80000, y: -30000, z: 5000}  # ~86km away
    velocity: {x: -100, y: 50, z: 0}  # Moving
    mass: 8000
    max_hull_integrity: 600  # Winnable with 12 torpedoes (60 dmg each = 720 max)
    systems:
      propulsion:
        max_thrust: 40000
        fuel_level: 8000
        max_fuel: 8000
      sensors:
        passive:
          range: 150000
        active:
          scan_range: 400000
      targeting:
        lock_range: 500000.0
      navigation: {}
      weapons:
        weapons:
          - name: "railgun"
            power_cost: 15
            max_heat: 80
            ammo: 50
        hardpoints:
          - id: "hp_fwd_1"
            weapon: "railgun"
            mount_type: "fixed"
            position_offset: {x: 20, y: 0, z: 0}
            orientation: {azimuth: 0, elevation: 0}
      combat:
        railguns: 1
        pdcs: 0
        torpedoes: 0

  # -- Navigation buoys for spatial orientation --
  - id: "nav_origin"
    name: "Nav-Origin"
    ship_class: "beacon"
    faction: "navigation"
    player_controlled: false
    ai_enabled: false
    position: {x: 0, y: 5000, z: 0}
    velocity: {x: 0, y: 0, z: 0}
  - id: "nav_engagement_zone"
    name: "Engagement-Zone"
    ship_class: "beacon"
    faction: "navigation"
    player_controlled: false
    ai_enabled: false
    position: {x: 40000, y: -15000, z: 0}
    velocity: {x: 0, y: 0, z: 0}
  - id: "nav_far_marker"
    name: "Far-Marker"
    ship_class: "beacon"
    faction: "navigation"
    player_controlled: false
    ai_enabled: false
    position: {x: 80000, y: 0, z: 0}
    velocity: {x: 0, y: 0, z: 0}

mission:
  name: "Pirate Threat"
  description: "Eliminate the pirate ship threatening civilian traffic"

  briefing: |
    Intelligence reports a pirate vessel operating in this sector.
    Your mission is to locate and destroy the threat.

    The target is a frigate-class ship, lightly armed but maneuverable.
    They're currently about 86km away and moving.

    Tactical considerations:
    - Use passive sensors first to avoid alerting them
    - Active ping will give you precise targeting but reveals your position
    - Engage intercept autopilot to close the distance
    - Fire torpedoes when within range
    - Use PDC for point defense if they return fire

    Weapons available:
    - 1x UNE-440 Railgun (20 rounds)
    - 12x Torpedoes (heavy, slow — best vs large/slow targets)
    - 8x Missiles (light, high-G — best vs fast maneuvering ships)
    - PDC (1000 rounds)

    Good hunting!

  objectives:
    - id: "destroy_pirate"
      type: "destroy_target"
      description: "Destroy the pirate ship"
      required: true
      params:
        target: "pirate01"

    - id: "player_survive"
      type: "player_mobility_kill"
      description: "Keep your ship operational"
      required: true
      params: {}

    - id: "conserve_ammo"
      type: "ammo_depleted"
      description: "Don't run out of ammunition"
      required: true
      params:
        target: "player"

  time_limit: 600  # 10 minutes — need time to close 86km + 12 torpedo reloads

  success_message: |
    Target destroyed! Well done.

    The sector is now safe for civilian traffic.
    Return to base for debriefing.

  failure_message: |
    Mission failed.

    Either the target escaped or you ran out of time.
    A tactical review is recommended.

  next_scenario: "03_escort_protect"

  hints:
    - trigger: "start"
      message: "Use 'contacts' to locate the pirate ship"
    - trigger: "range < 50000"
      target: "pirate01"
      message: "Target in range! Use 'target C001' then 'fire torpedo'"
    - trigger: "time > 240"
      message: "Time running out! Only 60 seconds remaining"
