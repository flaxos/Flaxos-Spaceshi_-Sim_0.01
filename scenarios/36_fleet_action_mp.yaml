# Multiplayer Mission: Fleet Action
#
# 3-4 player combined arms attack on a defended station. The player
# fleet (destroyer + 2 corvettes) must destroy a hostile station
# defended by 2 frigates and a destroyer.
#
# Design rationale:
#   - Combined arms: the destroyer provides heavy firepower while
#     corvettes screen and flank. Players must use their ships'
#     strengths -- the destroyer absorbs fire, corvettes are fast.
#   - The station is stationary but well-armed. Players must
#     suppress its defenders before closing for the kill.
#   - The enemy destroyer is the main threat -- it can trade blows
#     with the player destroyer. Corvettes should flank it.
#   - Wedge formation start gives structure but players should
#     break formation once combat begins.

name: "Fleet Action"
description: "A 3-player fleet assaults a defended station with combined arms tactics"

difficulty: "extreme"
player_count: "3-4"
category: "fleet"

dt: 0.1

# -- Ships ----------------------------------------------------------------

ships:
  # -- Player 1: destroyer (flagship) ------------------------------------
  - id: "player"
    name: "UNS Hammerstrike"
    ship_class: "destroyer"
    faction: "unsa"
    player_controlled: true
    position: {x: -100000, y: 0, z: 0}
    velocity: {x: 80, y: 0, z: 0}
    orientation: {pitch: 0, yaw: 0, roll: 0}
    systems:
      propulsion:
        fuel_level: 1000.0
        max_fuel: 1200.0
      sensors:
        passive:
          range: 150000
        active:
          scan_range: 250000
      targeting:
        lock_time: 1.2
        lock_range: 100000
      combat:
        enabled: true
        railguns: 3
        pdcs: 6
      navigation: {}
    damage_model:
      propulsion: {max_health: 120.0, health: 120.0}
      rcs: {max_health: 100.0, health: 100.0}
      weapons: {max_health: 110.0, health: 110.0}
      sensors: {max_health: 80.0, health: 80.0}

  # -- Player 2: corvette ------------------------------------------------
