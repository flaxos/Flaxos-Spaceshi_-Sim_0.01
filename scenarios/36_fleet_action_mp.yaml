# -- Fleets ---------------------------------------------------------------

fleets:
  - fleet_id: "attack_fleet"
    name: "Task Force Hammer"
    faction: "unsa"
    flagship: "player"
    ships: ["player", "player_dagger", "player_wolf"]

  - fleet_id: "defense_fleet"
    name: "Deimos Defense Force"
    faction: "hostile"
    ships: ["enemy_frigate_1", "enemy_frigate_2", "enemy_destroyer", "deimos_relay"]

# -- Mission --------------------------------------------------------------

mission:
  name: "Fleet Action"
  description: "Three-player fleet assault on a defended hostile station"

  briefing: |
    MISSION BRIEFING: FLEET ACTION

    Task Force Hammer has been ordered to destroy Deimos Relay, a
    hostile communications station controlling enemy fleet coordination
    in this sector. The station is defended by a significant escort
    force.

    FORCES:
      - UNS Hammerstrike (destroyer, Player 1) -- 3 railguns, 6 PDCs
        Flagship. Heavy armor, heavy guns. Lead the assault.
      - UNS Dagger (corvette, Player 2) -- 1 railgun, 3 PDCs
        Fast flanker. Screen and harass.
      - UNS Wolf (corvette, Player 3) -- 1 railgun, 3 PDCs
        Fast flanker. Screen and harass.

    ENEMY FORCES:
      - Deimos Relay (station) -- 1 railgun, 6 PDCs, heavy armor
        Stationary but dangerous. Do not approach without suppressing
        its escort first.
      - "Bulwark" (destroyer) -- 3 railguns, 6 PDCs
        The main threat. Positioned between you and the station.
      - "Sentinel" (frigate) -- 2 railguns, 4 PDCs
        Screening the station's port flank.
      - "Warden" (frigate) -- 2 railguns, 4 PDCs
        Screening the station's starboard flank.

    APPROACH:
      Starting in wedge formation, 100km from target. Break formation
      once engagement begins.

    TACTICS:
      - Hammerstrike engages the Bulwark head-on. Match its firepower.
      - Dagger and Wolf split to flank -- one takes each frigate.
      - Once escorts are suppressed, all ships converge on the station.
      - The station cannot move but its railgun hits hard. Approach
        from multiple vectors to split its fire.
      - Corvettes: do NOT trade broadsides with the destroyer. Use
        speed to stay in its blind spots.

    VICTORY: Destroy Deimos Relay. All player ships survive.
    BONUS: Destroy all enemy escort ships.

    Hit hard, hit fast, and watch each other's backs.

  time_limit: 900  # 15 minutes

  objectives:
    # Primary: destroy the station
    - id: "destroy_station"
      type: "mission_kill"
      description: "Destroy Deimos Relay"
      required: true
      params:
        target: "deimos_relay"

    # Primary: all player ships survive
    - id: "hammerstrike_survives"
      type: "avoid_mission_kill"
      description: "Keep UNS Hammerstrike operational"
      required: true
      params:
        target: "player"

    - id: "dagger_survives"
      type: "avoid_mission_kill"
      description: "Keep UNS Dagger operational"
      required: true
      params:
        target: "player_dagger"

    - id: "wolf_survives"
      type: "avoid_mission_kill"
      description: "Keep UNS Wolf operational"
      required: true
      params:
        target: "player_wolf"

    # Optional: destroy all escorts
    - id: "kill_sentinel"
      type: "mission_kill"
      description: "Destroy frigate Sentinel"
      required: false
      params:
        target: "enemy_frigate_1"

    - id: "kill_warden"
      type: "mission_kill"
      description: "Destroy frigate Warden"
      required: false
      params:
        target: "enemy_frigate_2"

    - id: "kill_bulwark"
      type: "mission_kill"
      description: "Destroy destroyer Bulwark"
      required: false
      params:
        target: "enemy_destroyer"

  success_message: |
    FLEET ACTION -- COMPLETE

    Deimos Relay has been destroyed. Hostile communications in this
    sector are severed. Enemy fleet coordination will be degraded
    for weeks.

    Task Force Hammer executed a textbook combined arms assault.
    All three ships operational.

    Outstanding work, Commanders.

  failure_message: |
    FLEET ACTION -- FAILED

    Task Force Hammer could not complete the assault. Either a ship
    was lost, or the station's defenses held.

    Review your coordination:
    - Did the Hammerstrike engage the Bulwark to draw fire?
    - Did the corvettes flank the frigates?
    - Did you suppress escorts before closing on the station?
    - Did the corvettes avoid the destroyer's broadside?

  hints:
    - trigger: "start"
      message: "COMMS: Task Force Hammer, wedge formation. Hammerstrike on point. Dagger high, Wolf low. Advance."

    - trigger: "range < 80000"
      target: "enemy_destroyer"
      message: "TACTICAL: Hostile destroyer Bulwark at 80km. Hammerstrike, engage. Corvettes, break and flank."

    - trigger: "range < 60000"
      target: "deimos_relay"
      message: "TACTICAL: Station in weapons range. Suppress the escorts before closing."

    - trigger: "time > 300"
      message: "OPS: Five minutes. If escorts are still up, focus fire. The station can wait."

    - trigger: "time > 600"
      message: "OPS: Ten minutes. If the station is still standing, all ships converge now."
