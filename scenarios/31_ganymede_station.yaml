# Campaign Mission: Ganymede Station Defense
#
# Escalating wave defense around a stationary station. Three waves
# arrive from different bearings, forcing the player to reposition
# and manage weapon cooldowns across engagements.
#
# Design rationale:
#   - Wave spacing (0s / 120s / 300s) gives the player time to
#     rearm and reposition between contacts, but not enough to relax.
#   - Each wave is harder than the last: 2 corvettes, then frigate +
#     corvette, then a full destroyer. The player must conserve ammo
#     and manage PDC coverage for the station.
#   - The station has its own PDC grid, so clever positioning lets
#     the player use it as a force multiplier.
#   - Bearings (045, 270, 180) force 360-degree awareness.

name: "Ganymede Station Defense"
description: "Defend Ganymede Station against three waves of hostile ships attacking from multiple vectors"

difficulty: "extreme"
player_count: "1-2"
category: "campaign"

dt: 0.1

