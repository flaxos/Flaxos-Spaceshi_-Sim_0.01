# -- Mission --------------------------------------------------------------

mission:
  name: "Ganymede Station Defense"
  description: "Defend Ganymede Station against three escalating waves of hostile ships"

  briefing: |
    MISSION BRIEFING: GANYMEDE STATION DEFENSE

    SHIP TRANSFER: Following the Canterbury incident, you have been
    transferred to the destroyer UNS Aegis. Ganymede Station needs
    heavy firepower -- corvettes and frigates won't cut it against
    what's coming.

    Ganymede Station is under imminent threat. Long-range sensors have
    detected multiple hostile groups converging from different vectors.
    You are the only warship in range.

    FORCES:
      - UNS Aegis (destroyer, your ship) -- 3 railguns, 6 PDCs
      - Ganymede Station -- stationary, 8 PDCs (point defense grid only)

    THREAT ASSESSMENT:
      Wave 1 (IMMINENT): Two corvettes inbound from bearing 045.
        Fast, lightly armed. Probing attack.
      Wave 2 (ETA 120s): Frigate with corvette escort from bearing 270.
        The frigate carries railguns. Real threat to station armor.
      Wave 3 (ETA 300s): Hostile destroyer from bearing 180.
        Heavy armor, heavy guns. The main assault force.

    TACTICAL NOTES:
      - The station cannot move. You must position yourself to intercept
        threats before they reach weapons range of the station.
      - Use the station's PDC grid as a defensive umbrella -- stay close
        enough for overlapping fields of fire against torpedoes.
      - Waves arrive from different bearings. You cannot camp one sector.
      - Prioritize the frigate and destroyer. Corvettes are dangerous
        only in numbers.
      - Budget ammunition across all three waves. The destroyer is the
        hardest target and arrives last.

    Hold the line, Commander. Ganymede depends on you.

  time_limit: 900  # 15 minutes

  objectives:
    # Primary: station must survive
    - id: "protect_station"
      type: "protect_ship"
      description: "Protect Ganymede Station from destruction"
      required: true
      params:
        target: "ganymede_station"
        time: 900
        start_time: 0

    # Primary: player must survive
    - id: "player_survives"
      type: "avoid_mission_kill"
      description: "Keep the UNS Aegis operational"
      required: true
      params:
        target: "player"

    # Primary: destroy all hostiles
    - id: "kill_wave1_1"
      type: "mission_kill"
      description: "Neutralize Bandit-1"
      required: true
      params:
        target: "wave1_corvette_1"

    - id: "kill_wave1_2"
      type: "mission_kill"
      description: "Neutralize Bandit-2"
      required: true
      params:
        target: "wave1_corvette_2"

    - id: "kill_wave2_frigate"
      type: "mission_kill"
      description: "Neutralize frigate Striker"
      required: true
      params:
        target: "wave2_frigate"

    - id: "kill_wave2_corvette"
      type: "mission_kill"
      description: "Neutralize Bandit-3"
      required: true
      params:
        target: "wave2_corvette"

    - id: "kill_wave3_destroyer"
      type: "mission_kill"
      description: "Neutralize destroyer Ravager"
      required: true
      params:
        target: "wave3_destroyer"

  next_scenario: "32_the_donnager"

  success_message: |
    GANYMEDE STATION DEFENSE -- COMPLETE

    All hostile contacts neutralized. Ganymede Station is secure.

    Three waves, three bearings, zero breaches. The station's PDC grid
    and your railguns made the difference. Intelligence will want to
    know who sent a destroyer-class warship against a civilian station.

    Outstanding work, Commander.

  failure_message: |
    GANYMEDE STATION DEFENSE -- FAILED

    Ganymede Station has been destroyed, or the Aegis is no longer
    combat-capable. Thousands of civilians are at the mercy of
    hostile forces.

    Review your approach:
    - Did you prioritize the heavier threats?
    - Did you use the station's PDC umbrella?
    - Did you conserve ammunition for the final wave?

  hints:
    - trigger: "start"
      message: "SENSORS: Two corvette-class contacts inbound from bearing 045. Designating Wave 1."

    - trigger: "time > 100"
      message: "OPS: Second wave inbound in approximately 20 seconds. Reposition to cover bearing 270."

    - trigger: "time > 120"
      message: "SENSORS: New contacts from bearing 270! Frigate-class with escort. Wave 2 is here."

    - trigger: "time > 280"
      message: "OPS: Final wave inbound in approximately 20 seconds. Bearing 180. This is the big one."

    - trigger: "time > 300"
      message: "SENSORS: Destroyer-class contact from bearing 180! Wave 3 -- all hands to battle stations."

    - trigger: "time > 600"
      message: "OPS: Ten minutes in. If hostiles remain, check ammunition reserves."
