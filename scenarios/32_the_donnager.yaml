# Campaign Mission: The Donnager
#
# Last-stand survival scenario. The player commands a battleship
# against overwhelming numbers -- 6 corvettes and 2 frigates.
# The goal is to survive 10 minutes while data transmits, not to
# win outright (though destroying 3+ enemies is a bonus objective).
#
# Design rationale:
#   - The battleship has massive firepower but cannot kill everything
#     fast enough. The player must triage -- which threats to engage
#     first, which arcs to expose.
#   - 8 hostiles from multiple bearings prevent "point nose at
#     everything" cheese. The player must rotate and manage PDC arcs.
#   - 600s timer creates tension: every second of survival matters,
#     but aggressive play risks exposing weaknesses.
#   - The optional "kill 3+" objective rewards skilled play without
#     punishing defensive strategy.

name: "The Donnager"
description: "Command a battleship in a last stand against overwhelming hostile forces while critical data transmits"

difficulty: "extreme"
player_count: "1"
category: "campaign"

dt: 0.1

