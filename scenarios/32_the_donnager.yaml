# -- Mission --------------------------------------------------------------

mission:
  name: "The Donnager"
  description: "Hold the line in a battleship against overwhelming hostile forces while critical data transmits"

  briefing: |
    MISSION BRIEFING: THE DONNAGER

    This is a last stand.

    The MCRN Donnager has been ambushed by an unknown hostile fleet
    while transmitting classified intelligence data. The data transfer
    requires 10 minutes to complete. You must survive until
    transmission is finished.

    FORCES:
      - MCRN Donnager (battleship, your ship) -- 4 railguns, 10 PDCs
        The most powerful warship in the system. But even a battleship
        has limits.

    ENEMY:
      - 6 hostile corvettes converging from all quadrants
      - 2 hostile frigates flanking from high and low
      - Unknown faction. Stealth-coated. Well-coordinated.
      - They are not here to negotiate.

    TACTICAL ASSESSMENT:
      - You are outnumbered 8 to 1. You cannot kill them all quickly.
      - Corvettes will try to swarm and overwhelm your PDC coverage.
      - Frigates carry railguns -- they will try to stay at range and
        punch through your armor while corvettes distract.
      - Prioritize the frigates. Their railguns are the real threat
        to your hull integrity.
      - Rotate your facing to spread incoming fire across armor sections.
      - Do NOT chase individual corvettes. Hold position and let them
        come to you where your PDC grid is strongest.

    VICTORY: Survive for 600 seconds (10 minutes).
    BONUS: Destroy 3 or more hostile ships.
    DEFEAT: Donnager suffers mission kill before transmission completes.

    Hold the line, Captain. The data must get through.

  time_limit: 900  # 15 min hard cap, but survive_time objective is 600s

  objectives:
    # Primary: survive 10 minutes
    - id: "survive_transmission"
      type: "survive_time"
      description: "Survive until data transmission completes (600 seconds)"
      required: true
      params:
        time: 600
        start_time: 0

    # Primary: player must not be mission-killed
    - id: "player_survives"
      type: "avoid_mission_kill"
      description: "Keep the Donnager combat-capable"
      required: true
      params:
        target: "player"

    # Optional: destroy 3+ enemies (any combination)
    - id: "kill_phantom_1"
      type: "mission_kill"
      description: "Destroy Phantom-1"
      required: false
      params:
        target: "hostile_corvette_1"

    - id: "kill_phantom_2"
      type: "mission_kill"
      description: "Destroy Phantom-2"
      required: false
      params:
        target: "hostile_corvette_2"

    - id: "kill_phantom_3"
      type: "mission_kill"
      description: "Destroy Phantom-3"
      required: false
      params:
        target: "hostile_corvette_3"

    - id: "kill_phantom_4"
      type: "mission_kill"
      description: "Destroy Phantom-4"
      required: false
      params:
        target: "hostile_corvette_4"

    - id: "kill_phantom_5"
      type: "mission_kill"
      description: "Destroy Phantom-5"
      required: false
      params:
        target: "hostile_corvette_5"

    - id: "kill_phantom_6"
      type: "mission_kill"
      description: "Destroy Phantom-6"
      required: false
      params:
        target: "hostile_corvette_6"

    - id: "kill_scimitar"
      type: "mission_kill"
      description: "Destroy frigate Scimitar"
      required: false
      params:
        target: "hostile_frigate_1"

    - id: "kill_claymore"
      type: "mission_kill"
      description: "Destroy frigate Claymore"
      required: false
      params:
        target: "hostile_frigate_2"

  next_scenario: "33_belter_uprising"

  success_message: |
    THE DONNAGER -- TRANSMISSION COMPLETE

    Data transfer confirmed. The intelligence package has been received
    by MCRN Command. Whatever these hostiles were trying to suppress,
    it is now in friendly hands.

    The Donnager took heavy damage but held the line. Damage control
    teams are working to restore critical systems.

    The unknown hostiles are breaking off -- they failed their objective.

    Well fought, Captain.

  failure_message: |
    THE DONNAGER -- LOST

    The Donnager has suffered catastrophic systems failure. Propulsion
    destroyed, weapons offline. The data transmission was interrupted
    at the worst possible moment.

    The intelligence package is lost. MCRN Command is blind.

    Review your tactics:
    - Did you rotate armor facings to spread damage?
    - Did you prioritize the frigates and their railguns?
    - Did you let the PDC grid handle corvettes at close range?

  hints:
    - trigger: "start"
      message: "COMMS: All hands, battle stations. Eight hostile contacts converging. Data transmission in progress -- 600 seconds to completion."

    - trigger: "time > 60"
      message: "TACTICAL: Corvettes closing fast. Let PDCs handle the small fish -- save railgun rounds for the frigates."

    - trigger: "time > 180"
      message: "OPS: Three minutes down, seven to go. Monitor armor integrity across all sections."

    - trigger: "time > 300"
      message: "OPS: Halfway. Transmission at 50%. Hold the line, Captain."

    - trigger: "time > 450"
      message: "OPS: 150 seconds remaining. Almost there."

    - trigger: "time > 540"
      message: "COMMS: One minute to transmission complete. Hold on!"
