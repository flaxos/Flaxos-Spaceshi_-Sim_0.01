# Campaign Mission: Ring Gate Approach
#
# Deep space research mission with fuel tension. The player must scan
# 4 beacons at increasing distances and return to start on limited fuel.
#
# Design rationale:
#   - This is a planning mission, not a combat mission. The challenge
#     is fuel management and route optimization.
#   - Beacons at 50/100/200/400km force increasingly costly burns.
#     With only 60% fuel, the player cannot brute-force every leg --
#     they must coast between burns and plan deceleration carefully.
#   - The science vessel is fragile and slow. No combat systems.
#     If something goes wrong, there is no fighting your way out.
#   - The return-to-start objective means the player must budget
#     fuel for the entire round trip, not just the outbound leg.
#   - Beacons are stationary freighter-class objects (no weapons,
#     no AI) -- they exist only as scan targets.

name: "Ring Gate Approach"
description: "Navigate a fuel-limited science vessel to scan 4 deep space beacons and return safely"

difficulty: "hard"
player_count: "1"
category: "campaign"

dt: 0.1

# -- Ships ----------------------------------------------------------------

ships:
  # -- Player science vessel (low fuel) -----------------------------------
  - id: "player"
    name: "UNSV Kepler"
    ship_class: "science_vessel"
    faction: "unsa"
    player_controlled: true
    position: {x: 0, y: 0, z: 0}
    velocity: {x: 0, y: 0, z: 0}
    orientation: {pitch: 0, yaw: 0, roll: 0}
    systems:
      propulsion:
        fuel_level: 300.0
        max_fuel: 500.0
      sensors:
        passive:
          range: 450000  # See all beacons from start to plan fuel route
        active:
          scan_range: 200000
      targeting:
        lock_time: 2.0
        lock_range: 50000
      combat:
        enabled: false
        railguns: 0
        pdcs: 1
      navigation: {}
    damage_model:
      propulsion: {max_health: 60.0, health: 60.0}
      rcs: {max_health: 50.0, health: 50.0}
      weapons: {max_health: 20.0, health: 20.0}
      sensors: {max_health: 80.0, health: 80.0}

