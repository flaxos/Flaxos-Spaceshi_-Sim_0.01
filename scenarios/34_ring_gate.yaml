mission:
  name: "Ring Gate Approach"
  description: "Scan four deep space beacons and return to origin on limited fuel"

  briefing: |
    MISSION BRIEFING: RING GATE APPROACH

    VESSEL ASSIGNMENT: The science vessel UNSV Kepler has been
    assigned for the Ring Gate survey. No weapons, minimal fuel --
    this is pure navigation. Combat ships are too conspicuous near
    the Ring, and the Kepler's sensor suite is purpose-built for
    anomalous signal characterization. Every burn counts.

    The UNSV Kepler has been tasked with surveying a chain of anomalous
    signal beacons detected along the approach vector to the Ring Gate.
    Each beacon must be scanned at close range to characterize the
    signal source.

    FORCES:
      - UNSV Kepler (science vessel, your ship) -- 0 railguns, 1 PDC
        Equipped for survey, not combat. Handle with care.

    BEACON POSITIONS (along +X axis from origin):
      - Beacon Alpha:  50 km
      - Beacon Beta:  100 km
      - Beacon Gamma: 200 km
      - Beacon Delta: 400 km

    CRITICAL CONSTRAINT: FUEL
      Your tanks are at 60% capacity (300 of 500 units). This is
      NOT enough for reckless flying. You must:
      - Plan efficient burn-coast-brake profiles
      - Minimize unnecessary thrust corrections
      - Budget fuel for the RETURN trip to origin

    MISSION PROFILE:
      1. Scan all four beacons (close approach required for each)
      2. Return to origin point (within 5km)
      3. Do not run out of fuel in deep space

    The beacons are passive -- no threat expected. But fuel exhaustion
    400km from anywhere is its own kind of emergency.

    Fly smart, Commander. Every kilogram of propellant counts.

  time_limit: 2400  # 40 minutes -- long mission, lots of coasting

  objectives:
    # Primary: scan all 4 beacons
    - id: "scan_beacon_1"
      type: "scan_target"
      description: "Scan Beacon Alpha (50km)"
      required: true
      params:
        target: "beacon_1"

    - id: "scan_beacon_2"
      type: "scan_target"
      description: "Scan Beacon Beta (100km)"
      required: true
      params:
        target: "beacon_2"

    - id: "scan_beacon_3"
      type: "scan_target"
      description: "Scan Beacon Gamma (200km)"
      required: true
      params:
        target: "beacon_3"

    - id: "scan_beacon_4"
      type: "scan_target"
      description: "Scan Beacon Delta (400km)"
      required: true
      params:
        target: "beacon_4"

    # Primary: return to origin
    - id: "return_to_origin"
      type: "reach_position"
      description: "Return to origin point after scanning all beacons"
      required: true
      params:
        position: {x: 0, y: 0, z: 0}
        tolerance: 5000
        initial_distance: 400000

    # Primary: player survives
    - id: "player_survives"
      type: "avoid_mission_kill"
      description: "Keep the UNSV Kepler operational"
      required: true
      params:
        target: "player"

  success_message: |
    RING GATE APPROACH -- COMPLETE

    All four beacons scanned successfully. Data packages compiled
    and ready for transmission to UNS Science Command.

    Beacon signals show consistent anomalous patterns that correlate
    with Ring Gate approach vectors. This data will reshape our
    understanding of the gate's navigation characteristics.

    The Kepler has returned safely with fuel to spare. Textbook
    deep space survey operation.

    Well navigated, Commander.

  failure_message: |
    RING GATE APPROACH -- FAILED

    The survey mission could not be completed. Either the Kepler
    ran out of fuel in deep space, critical systems failed, or
    the return leg was not completed.

    Review your approach:
    - Did you plan burn-coast-brake profiles for each leg?
    - Did you budget fuel for the return trip?
    - Did you minimize unnecessary course corrections?

  hints:
    - trigger: "start"
      message: "SCIENCE: Four beacons on long-range sensors. Plan your fuel budget -- 300 units for an 800km round trip."

    - trigger: "time > 300"
      message: "OPS: Five minutes in. Check fuel consumption against your plan."

    - trigger: "time > 900"
      message: "OPS: Fifteen minutes. How far along the beacon chain are you?"

    - trigger: "time > 1500"
      message: "OPS: Twenty-five minutes. If you haven't started the return leg, fuel will be critical."

    - trigger: "time > 2100"
      message: "OPS: Thirty-five minutes. Five minutes remaining. You should be approaching origin."
