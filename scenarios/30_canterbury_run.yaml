# Campaign Mission: The Canterbury Run
#
# Player escorts the freighter "Canterbury" along a 3-waypoint route
# through contested space. Two pirate ambushes test escort discipline:
#   - Waypoint 2: 2 corvettes hit the convoy
#   - Waypoint 3: 1 frigate + 1 corvette for a heavier second wave
#
# The Canterbury has limited fuel and slow acceleration -- the escort
# must not outrun it. Branch point at waypoint 2 lets the player
# choose to stand and fight or burn past.
#
# Design rationale:
#   - Escort gameplay forces the player to match freighter speed, not
#     just fly as fast as possible. Discipline > aggression.
#   - Waypoints are 50km apart -- far enough to require real burns,
#     close enough to keep the scenario under 30 minutes.
#   - Branching at waypoint 2 tests player judgment: engaging burns
#     fuel and risks damage, but clearing the threat protects the
#     Canterbury for the final leg. Burning past saves fuel but
#     leaves enemies on your tail.

name: "The Canterbury Run"
description: "Escort a civilian freighter through pirate-infested space along a 3-waypoint route"

difficulty: "hard"
player_count: "1-2"
category: "campaign"

dt: 0.1

