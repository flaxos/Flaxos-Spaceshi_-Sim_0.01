# ── Mission ──────────────────────────────────────────────────────

mission:
  name: "The Canterbury Run"
  description: "Escort the Canterbury along a 3-waypoint route through pirate territory"

  briefing: |
    MISSION BRIEFING: THE CANTERBURY RUN

    The civilian freighter Canterbury is transporting critical medical
    supplies from Ceres to Tycho Station. Intelligence reports pirate
    activity along the transit corridor. You have been assigned as
    sole escort.

    ROUTE:
      Waypoint 1: {50km, 0, 0}  -- clear space, sensor calibration
      Waypoint 2: {100km, 0, 0} -- suspected pirate staging area
      Waypoint 3: {150km, 0, 0} -- final approach, destination

    FORCES:
      - UNS Rocinante (frigate, your ship) -- 2 railguns, 4 PDCs
      - Canterbury (civilian freighter) -- no weapons, light armor

    THREATS:
      - 2 pirate corvettes operating near waypoint 2
      - Heavier pirate force (frigate + corvette) near waypoint 3

    CRITICAL CONSTRAINTS:
      - The Canterbury has LIMITED FUEL. Do not force high-speed burns.
        Match the freighter's pace -- 80 m/s cruise speed.
      - The Canterbury must reach waypoint 3 alive. This is your
        primary objective.
      - You start with 80% fuel. Budget carefully across 150km.

    TACTICAL NOTES:
      - At waypoint 2, you may choose to engage the pirates or burn
        past them. Engaging costs fuel and risks damage, but clears
        the threat. Burning past leaves enemies on your tail.
      - The waypoint 3 ambush is heavier -- a pirate frigate with
        escort. If you took damage at waypoint 2, engineering is
        critical.
      - Stay close to the Canterbury. If you chase too far, the
        other pirates may circle back.

    Protect the Canterbury at all costs, Commander.

  time_limit: 1800  # 30 minutes

  objectives:
    # Primary: Canterbury must survive
    - id: "protect_canterbury"
      type: "protect_ship"
      description: "Protect the Canterbury until it reaches destination"
      required: true
      params:
        target: "canterbury"
        time: 1800
        start_time: 0

    # Primary: player must survive
    - id: "player_survives"
      type: "avoid_mission_kill"
      description: "Keep your ship operational"
      required: true
      params:
        target: "player"

    # Primary: reach waypoint 3 (destination)
    - id: "reach_destination"
      type: "reach_position"
      description: "Escort Canterbury to destination (waypoint 3)"
      required: true
      params:
        position: {x: 150000, y: 0, z: 0}
        tolerance: 5000
        initial_distance: 150000

    # Secondary: neutralize waypoint 2 ambush
    - id: "kill_viper"
      type: "mission_kill"
      description: "Neutralize pirate corvette Viper"
      required: false
      params:
        target: "pirate_corvette_1"

    - id: "kill_scorpion"
      type: "mission_kill"
      description: "Neutralize pirate corvette Scorpion"
      required: false
      params:
        target: "pirate_corvette_2"

    # Secondary: neutralize waypoint 3 ambush
    - id: "kill_blackjack"
      type: "mission_kill"
      description: "Neutralize pirate frigate Blackjack"
      required: false
      params:
        target: "pirate_frigate"

    - id: "kill_rattlesnake"
      type: "mission_kill"
      description: "Neutralize pirate corvette Rattlesnake"
      required: false
      params:
        target: "pirate_corvette_3"

  # ── Branch points ────────────────────────────────────────────

  branch_points:
    # Branch: player engages at waypoint 2 (closes to weapons range)
    - id: "engage_at_wp2"
      priority: 10
      logic: "and"
      conditions:
        - type: "contact_range"
          params:
            target: "pirate_corvette_1"
            comparison: "lt"
            range: 50000
        - type: "time_elapsed"
          params:
            threshold: 180
            comparison: "gt"
      branch:
        id: "engage_ambush"
        description: "Engaging pirate ambush at waypoint 2. Clear the threat."
        add_objectives:
          - id: "clear_wp2"
            type: "mission_kill"
            description: "Neutralize both waypoint 2 pirates"
            required: false
            params:
              target: "pirate_corvette_1"
        success_message: |
          Waypoint 2 cleared. Pirates neutralized. Proceeding to waypoint 3.

    # Branch: low fuel emergency
    - id: "fuel_critical"
      priority: 20
      logic: "and"
      conditions:
        - type: "fuel_level"
          params:
            target: "player"
            comparison: "lt"
            threshold: 0.15
      branch:
        id: "fuel_emergency"
        description: "Fuel critical. Canterbury must reach destination on remaining reserves."
        failure_message: |
          Fuel reserves critical. You burned too hard, too fast.
          The Canterbury is on its own now.

  # ── Comms choices ──────────────────────────────────────────────

  comms_choices:
    - choice_id: "wp2_decision"
      contact_id: "canterbury"
      prompt: |
        Captain, we're detecting two hostile contacts near waypoint 2.
        Do we engage or try to burn past them?
      timeout: 60
      default_option: "engage"
      options:
        - option_id: "engage"
          label: "Engage pirates"
          description: "We clear the threat. Hold course, Canterbury -- I'll handle this."
        - option_id: "burn_past"
          label: "Burn past them"
          description: "All ahead full. We run the gauntlet and save fuel for waypoint 3."

  next_scenario: "31_ganymede_station"

  success_message: |
    THE CANTERBURY RUN -- COMPLETE

    The Canterbury has reached its destination safely. Medical supplies
    will reach Tycho Station on schedule.

    Mission assessment:
    - Canterbury: intact
    - Escort performance: evaluated on fuel remaining and threats neutralized
    - Pirates neutralized: check tactical log for final count

    Well done, Commander. The next assignment awaits.

  failure_message: |
    THE CANTERBURY RUN -- FAILED

    The Canterbury has been destroyed or you were unable to complete
    the escort. Those medical supplies will never reach Tycho.

    Review your approach:
    - Did you stay close enough to the Canterbury?
    - Did you manage fuel across all three waypoints?
    - Did you prioritize protection over kills?

  hints:
    - trigger: "start"
      message: "Match velocity with the Canterbury: 80 m/s along +X. Stay within 5km."

    - trigger: "range < 80000"
      target: "pirate_corvette_1"
      message: "SENSORS: Two hostile contacts detected near waypoint 2! Corvette-class, closing fast."

    - trigger: "range < 50000"
      target: "pirate_corvette_1"
      message: "TACTICAL: Pirates in engagement range. Decision time -- engage or burn past?"

    - trigger: "range < 80000"
      target: "pirate_frigate"
      message: "SENSORS: Heavy contact at waypoint 3! Frigate-class with escort. This is the big one."

    - trigger: "time > 300"
      message: "OPS: Five minutes in. Check fuel status and Canterbury hull integrity."

    - trigger: "time > 900"
      message: "OPS: Halfway through the run. Stay focused."

    - trigger: "time > 1500"
      message: "OPS: Five minutes remaining. Push for the destination."
