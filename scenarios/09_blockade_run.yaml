    # South-center patrol, covering y=-40km to y=0
    position: {x: -3000, y: -20000, z: 0}
    velocity: {x: 0, y: 15, z: 0}   # Drifting north
    orientation: {pitch: 0, yaw: 180, roll: 0}
    ai_behavior:
