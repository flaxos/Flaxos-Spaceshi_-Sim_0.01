# Scenario 09: Blockade Runner
# Stealth-focused: navigate a freighter through an enemy blockade.
#
# The player controls a smuggler's freighter trying to slip past 4 patrol
# corvettes that cover a 200km-wide transit corridor.  The patrols rely on
# passive IR detection -- a cold-drifting ship with EMCON engaged is nearly
# invisible.  The player must time burns between patrol sweeps, manage
# EMCON/cold-drift, and use ECM (chaff/flares) if detected.
#
# Win:  reach the destination waypoint (jump point beyond blockade)
# Lose: freighter drive destroyed, or captured (mission-killed)
#
# Design notes:
#   - Patrol ships use real sensor detection.  If the player stays below
#     their passive IR threshold they genuinely cannot see the player.
#   - Player tools: EMCON (go dark), cold-drift (shut reactor to battery),
#     timed burns between sweeps, ECM chaff/flares if detected.
#   - If detected the player can: fight through (unlikely vs 4 corvettes),
#     flee on an alternate vector (costs fuel), or get mission-killed.
#   - Patrol AI uses the "patrol" behavior profile -- they hold position
#     and only engage targets within engagement_range.

name: "Blockade Runner"
description: "Slip a freighter through an enemy blockade using stealth and timing"

dt: 0.1

ships:
  # ── Player ship: blockade runner freighter ──────────────────────
  - id: "player"
    name: "Sparrow"
    class: "freighter"
    faction: "smuggler"
    player_controlled: true
    mass: 25000
    max_hull_integrity: 200.0
    hull_integrity: 200.0
    # Start 150km behind the blockade line, offset to approach from the
    # gap between Patrol-1 and Patrol-2.
    position: {x: -150000, y: 20000, z: 0}
    velocity: {x: 0, y: 0, z: 0}
    orientation: {pitch: 0, yaw: 0, roll: 0}
    systems:
      propulsion:
        enabled: true
        max_thrust: 120000   # 120 kN -- modest for a 25t freighter (~4.8 m/s^2)
        fuel_level: 6000     # Tight fuel budget forces efficient burns
        max_fuel: 6000
      rcs:
        enabled: true
        max_torque: 30.0
        attitude_rate: 8.0   # Freighters turn slowly
      sensors:
        enabled: true
        passive:
          range: 250000      # 250km -- good passive array for a smuggler
        active:
          scan_range: 400000 # Active ping reveals position -- use sparingly
        signature_base: 0.8  # Low-observable hull coating
      navigation:
        enabled: true
      targeting:
        enabled: true
      ecm:
        enabled: true
        emcon_active: false
        # Smuggler kit: extra chaff and flares, decent jammer
        jammer_power: 40000.0
        chaff_count: 8
        flare_count: 8
        emcon_ir_reduction: 0.2     # 80% IR reduction when dark -- good stealth hull
        emcon_rcs_reduction: 0.5    # 50% RCS reduction -- radar-absorbing coating
    damage_model:
      propulsion: {max_health: 80.0, health: 80.0}
      rcs: {max_health: 60.0, health: 60.0}
      sensors: {max_health: 50.0, health: 50.0}

  # ── Patrol ships: 4 corvettes covering the transit corridor ────
  #
  # The blockade line is at x=0, spread across y=-80km to y=+80km.
  # Gaps between patrols are ~40km wide -- tight but passable if the
  # player times burns between sensor sweeps.
  #
  # Patrol engagement_range is 60km.  Their passive sensor range is
  # 100km, but a cold-drifting EMCON freighter with signature_base 0.8
  # and 80% IR reduction will only be detectable at ~20-30km.

  - id: "patrol_01"
    name: "BNS Warden"
    class: "corvette"
    faction: "hostile"
    ai_enabled: true
    mass: 5000
    max_hull_integrity: 180.0
    hull_integrity: 180.0
    # Northernmost patrol, covering y=+40km to y=+80km
    position: {x: 0, y: 60000, z: 0}
    velocity: {x: 0, y: 20, z: 0}   # Slow patrol drift northward
    orientation: {pitch: 0, yaw: 180, roll: 0}
    ai_behavior:
      role: "patrol"
      aggression: 0.5
      engagement_range: 60000
      flee_threshold: 0.2
      evade_threshold: 0.4
      patrol_position: {x: 0, y: 60000, z: 0}
    systems:
      propulsion:
        enabled: true
        max_thrust: 200000   # 200 kN -- corvette is much faster than freighter
        fuel_level: 8000
        max_fuel: 8000
      rcs:
        enabled: true
        max_torque: 50.0
        attitude_rate: 15.0
      sensors:
        enabled: true
        passive:
          range: 100000      # 100km passive -- the threat envelope
        active:
          scan_range: 300000
        signature_base: 1.5  # Military ship, higher emissions
      navigation:
        enabled: true
      targeting:
        enabled: true
        lock_time: 2.0
        lock_range: 60000.0
      combat:
        enabled: true
        railguns: 1
        pdcs: 3
      weapons:
        enabled: true
        weapons:
          - name: "railgun"
            power_cost: 15
            max_heat: 80
            ammo_count: 30
          - name: "pdc"
            power_cost: 5
            max_heat: 50
            ammo_count: 800
    damage_model:
      propulsion: {max_health: 100.0, health: 100.0}
      rcs: {max_health: 80.0, health: 80.0}
      weapons: {max_health: 90.0, health: 90.0}
      sensors: {max_health: 70.0, health: 70.0}

  - id: "patrol_02"
    name: "BNS Sentinel"
    class: "corvette"
    faction: "hostile"
    ai_enabled: true
    mass: 5000
    max_hull_integrity: 180.0
    hull_integrity: 180.0
    # North-center patrol, covering y=0 to y=+40km
    position: {x: 5000, y: 20000, z: 0}
    velocity: {x: 0, y: -15, z: 0}  # Drifting south on patrol
    orientation: {pitch: 0, yaw: 180, roll: 0}
    ai_behavior:
      role: "patrol"
      aggression: 0.5
      engagement_range: 60000
      flee_threshold: 0.2
