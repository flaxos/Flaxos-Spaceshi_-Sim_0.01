mission:
  name: "Operation: Ghost Freight"
  description: "Navigate through a hostile blockade without being detected"

  briefing: |
    MISSION: Blockade Runner

    Your ship, the Sparrow, carries critical cargo that must reach the
    jump point beyond the enemy blockade.  Four corvettes patrol a
    200km-wide corridor at x=0.  Your destination is the jump point
    at x=+200km.

    The enemy relies on passive IR sensors with 100km range.  A ship
    burning its drive is visible across that entire envelope.  But a
    cold-drifting ship with EMCON engaged is nearly invisible --
    your stealth hull reduces IR signature by 80%.

    TACTICS:
    - Engage EMCON immediately to minimize your signature.
    - Build velocity with short burns BEFORE entering detection range.
      Coast through the blockade on momentum alone.
    - Time your approach to slip through the gap between Patrol-2
      (BNS Sentinel, y=+20km) and Patrol-3 (BNS Watchdog, y=-20km).
      The gap is ~40km wide -- stay centered and cold.
    - If detected: deploy chaff to break radar lock, deploy flares to
      confuse IR tracking, and burn hard for the jump point.
    - Fighting is a last resort -- you're a freighter against 4 corvettes.

    TOOLS:
    - EMCON mode: set_emcon (reduces IR by 80%, RCS by 50%)
    - Chaff: deploy_chaff (8 bundles -- radar clutter)
    - Flares: deploy_flare (8 flares -- IR decoys)
    - Jammer: activate_jammer (degrades enemy radar -- but emits!)

    FUEL WARNING: You have 6000 units.  There is no resupply.
    Every burn must count.

    Reach the jump point at x=200km.  Good luck, runner.

  objectives:
    # Primary: reach the jump point beyond the blockade
    - id: "reach_jump_point"
      type: "reach_position"
      description: "Reach the jump point beyond the blockade"
      required: true
      params:
        position: {x: 200000, y: 0, z: 0}
        tolerance: 5000        # Within 5km of the jump point
        initial_distance: 350000

    # Fail condition: player drive destroyed (mission killed)
    - id: "survive"
      type: "avoid_mission_kill"
      description: "Keep your drive intact"
      required: true
      params:
        target: "player"

    # Bonus: avoid detection entirely (stealth mastery)
    - id: "ghost_run"
      type: "avoid_detection"
      description: "Traverse the blockade without being detected"
      required: false
      params:
        time: 600             # 10 minutes -- enough for a full transit
        start_time: 0
        detection_range: 100000

  time_limit: 900  # 15 minutes -- generous but not infinite

  success_message: |
    Jump point reached!  The Sparrow slips through the blockade and
    engages its Epstein drive at full burn.  The patrol ships never
    knew you were there.

    By the time their sensors register the drive plume, you're
    already accelerating at 5g toward open space.  The cargo is safe.

    Outstanding work, runner.

  failure_message: |
    Mission failed.

    The blockade corvettes detected and intercepted the Sparrow.
    Your drive is destroyed and the cargo is seized.

    The blockade holds.

  hints:
    - trigger: "start"
      message: "Engage EMCON immediately with 'set_emcon' to reduce your IR signature by 80%."
    - trigger: "range < 120000"
      target: "patrol_02"
      message: "Approaching detection envelope! If you're not in EMCON and coasting, you WILL be detected."
    - trigger: "range < 60000"
      target: "patrol_02"
      message: "Inside engagement range. Stay cold. Any thrust now will light you up on IR."
    - trigger: "range < 30000"
      target: "patrol_02"
      message: "Dangerously close to a patrol. If detected, deploy chaff and flares, then burn for the jump point."
