# -- Mission --------------------------------------------------------------

mission:
  name: "Station Siege"
  description: "Two-player asymmetric defense -- station and destroyer vs coordinated assault"

  briefing: |
    MISSION BRIEFING: STATION SIEGE

    Ceres Station is under attack from two hostile groups converging
    from opposite directions. Player 1 commands the station's
    formidable defensive grid. Player 2 commands the mobile destroyer
    UNS Hammer.

    FORCES:
      Player 1 -- Ceres Station (stationary):
        - 2 railguns, 10 PDCs
        - Heavy armor, massive weapons health
        - Cannot move. Total dependence on Player 2 for mobile defense.

      Player 2 -- UNS Hammer (destroyer):
        - 3 railguns, 6 PDCs
        - Full mobility. Must intercept threats before they reach
          the station's vulnerable arcs.

    ENEMY FORCES:
      Attack Group Alpha (bearing 045):
        - "Raider-1" (corvette) -- fast, aggressive
        - "Raider-2" (corvette) -- fast, aggressive
        - "Marauder" (frigate) -- the real threat, railguns

      Attack Group Bravo (bearing 225):
        - "Raider-3" (corvette) -- fast, aggressive
        - "Raider-4" (corvette) -- fast, aggressive
        - "Ravager" (frigate) -- railguns, heavy hitter

    TACTICS:
      - The Hammer cannot be in two places at once. Choose which
        attack group to intercept. The station handles the other.
      - Station: prioritize PDC coverage against the vector the
        Hammer is NOT covering. Save railgun shots for frigates.
      - Hammer: engage the frigates first. Corvettes are dangerous
        but the frigate railguns will shred the station.
      - Communicate: call which bearing you are covering.

    VICTORY: Station survives. All attackers destroyed. Both players
    remain combat-capable.

    Coordinate or die.

  time_limit: 900  # 15 minutes

  objectives:
    # Primary: station survives
    - id: "protect_station"
      type: "protect_ship"
      description: "Ceres Station must survive the assault"
      required: true
      params:
        target: "player"
        time: 900
        start_time: 0

    # Primary: destroyer survives
    - id: "hammer_survives"
      type: "avoid_mission_kill"
      description: "Keep UNS Hammer operational"
      required: true
      params:
        target: "player_hammer"

    # Primary: destroy all attackers
    - id: "kill_raider_1"
      type: "mission_kill"
      description: "Destroy Raider-1"
      required: true
      params:
        target: "alpha_corvette_1"

    - id: "kill_raider_2"
      type: "mission_kill"
      description: "Destroy Raider-2"
      required: true
      params:
        target: "alpha_corvette_2"

    - id: "kill_marauder"
      type: "mission_kill"
      description: "Destroy frigate Marauder"
      required: true
      params:
        target: "alpha_frigate"

    - id: "kill_raider_3"
      type: "mission_kill"
      description: "Destroy Raider-3"
      required: true
      params:
        target: "bravo_corvette_1"

    - id: "kill_raider_4"
      type: "mission_kill"
      description: "Destroy Raider-4"
      required: true
      params:
        target: "bravo_corvette_2"

    - id: "kill_ravager"
      type: "mission_kill"
      description: "Destroy frigate Ravager"
      required: true
      params:
        target: "bravo_frigate"

  success_message: |
    STATION SIEGE -- COMPLETE

    All hostiles neutralized. Ceres Station stands.

    The asymmetric defense held -- the station's PDC grid and the
    Hammer's mobile firepower created overlapping kill zones that
    the attackers could not penetrate.

    Outstanding coordination, Commanders.

  failure_message: |
    STATION SIEGE -- FAILED

    The defense has collapsed. Either Ceres Station has been critically
    damaged, the Hammer was destroyed, or hostile ships remain.

    Review your coordination:
    - Did you divide coverage between attack vectors?
    - Did the Hammer prioritize the frigates?
    - Did the station manage PDC arcs against the uncovered vector?
    - Did you communicate target priorities?

  hints:
    - trigger: "start"
      message: "SENSORS: Two attack groups detected! Bearing 045 and bearing 225. Coordinate coverage now."

    - trigger: "range < 80000"
      target: "alpha_corvette_1"
      message: "TACTICAL: Group Alpha entering engagement range from bearing 045."

    - trigger: "range < 80000"
      target: "bravo_corvette_1"
      message: "TACTICAL: Group Bravo entering engagement range from bearing 225."

    - trigger: "time > 180"
      message: "OPS: Three minutes. If any frigates are still at range, they are lining up railgun shots. Intercept."

    - trigger: "time > 450"
      message: "OPS: Halfway. Check station armor integrity and Hammer ammunition."

    - trigger: "time > 700"
      message: "OPS: Final push. Destroy remaining hostiles before they regroup."
