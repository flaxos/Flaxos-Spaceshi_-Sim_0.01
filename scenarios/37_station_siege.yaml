# Multiplayer Mission: Station Siege
#
# Asymmetric 2-player defense. Player 1 commands a stationary station
# with heavy PDCs. Player 2 commands a mobile destroyer. Together they
# defend against 4 corvettes and 2 frigates attacking from two vectors.
#
# Design rationale:
#   - Asymmetric roles create distinct gameplay: the station player
#     manages PDC arcs and point defense priorities, while the
#     destroyer player maneuvers to intercept and engage.
#   - Two attack vectors (bearing 045 and 225) force the destroyer
#     to choose which wave to intercept. The station covers the other.
#   - The station cannot move -- the destroyer must be its shield
#     against the heavier frigate threats.
#   - 4 corvettes + 2 frigates is beatable but requires coordination.
#     If one player fails, both lose.

name: "Station Siege"
description: "Two players defend a station -- one commanding the station, one a destroyer -- against a coordinated assault"

difficulty: "extreme"
player_count: "2"
category: "fleet"

dt: 0.1

