<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>Flaxos Asset Editor</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ================================================================
       FLAXOS ASSET EDITOR - Design Tokens
       Mirrors gui/styles/main.css variables exactly.
       ================================================================ */
    :root {
      --bg-primary: #0a0a0f;
      --bg-panel: #12121a;
      --bg-input: #1a1a24;
      --bg-hover: #22222e;
      --bg-panel-raised: #161622;
      --bg-void: #060609;
      --border-default: #2a2a3a;
      --border-active: #3a3a4a;
      --border-focus: #4a4a5a;
      --border-subtle: #1e1e2e;
      --text-primary: #e0e0e0;
      --text-secondary: #888899;
      --text-dim: #555566;
      --text-bright: #ffffff;
      --status-nominal: #00ff88;
      --status-warning: #ffaa00;
      --status-critical: #ff4444;
      --status-info: #00aaff;
      --status-offline: #555566;
      --font-mono: "JetBrains Mono", "Fira Code", "Consolas", monospace;
      --font-sans: "Inter", "Segoe UI", system-ui, sans-serif;
      --font-size-xs: 0.7rem;
      --font-size-sm: 0.8rem;
      --font-size-base: 0.9rem;
      --font-size-lg: 1rem;
      --font-size-xl: 1.1rem;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --transition-fast: 0.1s ease;
      --transition-base: 0.2s ease;
      --sidebar-width: 250px;
      --right-panel-width: 350px;
    }

    /* ================================================================
       RESET & BASE
       ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; color-scheme: dark; }
    body {
      font-family: var(--font-sans);
      font-size: var(--font-size-base);
      color: var(--text-primary);
      background: var(--bg-primary);
      line-height: 1.5;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ================================================================
       SCROLLBAR
       ================================================================ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-input); }
    ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ================================================================
       TOP BAR
       ================================================================ */
    #top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm) var(--space-md);
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-default);
      height: 44px;
      flex-shrink: 0;
    }
    #top-bar .title {
      font-family: var(--font-mono);
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--status-info);
      letter-spacing: 1px;
    }
    #top-bar .right-section {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }
    .conn-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--font-size-xs);
      font-family: var(--font-mono);
      color: var(--text-secondary);
    }
    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--status-offline);
    }
    .conn-dot.connected {
      background: var(--status-nominal);
      box-shadow: 0 0 6px var(--status-nominal);
    }
    .conn-dot.error {
      background: var(--status-critical);
      box-shadow: 0 0 6px var(--status-critical);
    }
    .back-link {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--transition-fast);
    }
    .back-link:hover { color: var(--status-info); }

    /* ================================================================
       MAIN LAYOUT - Three column
       ================================================================ */
    #main-layout {
      display: flex;
      height: calc(100vh - 44px - 28px); /* minus top-bar and status-bar */
      overflow: hidden;
    }

    /* ================================================================
       LEFT SIDEBAR
       ================================================================ */
    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-panel);
      border-right: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .category-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-default);
    }
    .category-tab {
      flex: 1;
      padding: var(--space-sm) var(--space-md);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all var(--transition-fast);
      min-height: 36px;
    }
    .category-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
    .category-tab.active {
      color: var(--status-info);
      border-bottom-color: var(--status-info);
    }
    .sidebar-search {
      padding: var(--space-sm);
      border-bottom: 1px solid var(--border-default);
    }
    .sidebar-search input {
      width: 100%;
      padding: 6px var(--space-sm);
      background: var(--bg-input);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
      outline: none;
    }
    .sidebar-search input:focus { border-color: var(--status-info); }
    .sidebar-search input::placeholder { color: var(--text-dim); }

    .asset-list {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-xs);
    }
    .asset-item {
      display: flex;
      flex-direction: column;
      padding: var(--space-sm) var(--space-sm);
      margin-bottom: 2px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .asset-item:hover { background: var(--bg-hover); }
    .asset-item.selected {
      background: var(--bg-hover);
      border-color: var(--status-info);
    }
    .asset-item.dirty::after {
      content: "";
      position: absolute;
      top: 6px; right: 6px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--status-warning);
    }
    .asset-item { position: relative; }
    .asset-item-name {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .asset-item-meta {
      font-size: var(--font-size-xs);
      color: var(--text-dim);
      font-family: var(--font-mono);
    }

    .sidebar-actions {
      display: flex;
      gap: var(--space-xs);
      padding: var(--space-sm);
      border-top: 1px solid var(--border-default);
    }
    .sidebar-actions button {
      flex: 1;
      padding: 6px var(--space-sm);
      background: var(--bg-input);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      min-height: 32px;
    }
    .sidebar-actions button:hover { background: var(--bg-hover); border-color: var(--border-active); }
    .sidebar-actions button.danger:hover { border-color: var(--status-critical); color: var(--status-critical); }

    /* ================================================================
       CENTER PANEL - Editor
       ================================================================ */
    #center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .editor-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm) var(--space-md);
      background: var(--bg-panel-raised);
      border-bottom: 1px solid var(--border-default);
      gap: var(--space-sm);
      flex-shrink: 0;
    }
    .editor-title-section {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .editor-title {
      font-family: var(--font-mono);
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--text-bright);
    }
    .dirty-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--status-warning);
      box-shadow: 0 0 6px var(--status-warning);
      display: none;
    }
    .dirty-dot.visible { display: block; }
    .editor-actions {
      display: flex;
      gap: var(--space-sm);
    }
    .editor-actions button {
      padding: 6px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      min-height: 32px;
    }
    .editor-actions button:hover { background: var(--bg-hover); border-color: var(--border-active); }
    .editor-actions button.primary { background: var(--status-info); border-color: var(--status-info); color: var(--bg-primary); }
    .editor-actions button.primary:hover { filter: brightness(1.15); }
    .editor-actions button:disabled { opacity: 0.4; cursor: not-allowed; }

    .editor-body {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-md);
    }
    .editor-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
    }

    /* ================================================================
       FORM SECTIONS (collapsible)
       ================================================================ */
    .form-section {
      margin-bottom: var(--space-sm);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .form-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm) var(--space-md);
      background: var(--bg-panel-raised);
      cursor: pointer;
      user-select: none;
      transition: background var(--transition-fast);
    }
    .form-section-header:hover { background: var(--bg-hover); }
    .form-section-title {
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }
    .form-section-toggle {
      font-size: var(--font-size-xs);
      color: var(--text-dim);
      transition: transform var(--transition-base);
    }
    .form-section.collapsed .form-section-toggle { transform: rotate(-90deg); }
    .form-section-body {
      padding: var(--space-md);
      background: var(--bg-panel);
    }
    .form-section.collapsed .form-section-body { display: none; }

    /* ================================================================
       FORM FIELDS
       ================================================================ */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm) var(--space-md);
    }
    .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-grid.cols-1 { grid-template-columns: 1fr; }
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .form-field.full-width { grid-column: 1 / -1; }
    .form-field label {
      font-size: var(--font-size-xs);
      font-family: var(--font-mono);
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-field input,
    .form-field select,
    .form-field textarea {
      padding: 6px var(--space-sm);
      background: var(--bg-input);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
      outline: none;
      transition: border-color var(--transition-fast);
      width: 100%;
    }
    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus { border-color: var(--status-info); }
    .form-field input:read-only {
      color: var(--text-dim);
      cursor: not-allowed;
    }
    .form-field input::placeholder { color: var(--text-dim); }
    .form-field textarea { resize: vertical; min-height: 60px; }
    .form-field select { cursor: pointer; }
    .form-field input[type="checkbox"] {
      width: auto;
      accent-color: var(--status-info);
      cursor: pointer;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      flex-direction: row;
    }
    .checkbox-row label {
      cursor: pointer;
    }

    /* 3D vector input group */
    .vector-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-xs);
    }
    .vector-group input { text-align: center; }
    .vector-label {
      display: flex;
      gap: var(--space-xs);
    }
    .vector-label span {
      font-size: var(--font-size-xs);
      color: var(--text-dim);
      text-align: center;
      flex: 1;
    }

    /* ================================================================
       LIST FIELDS (weapons, hardpoints, etc.)
       ================================================================ */
    .list-field {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .list-item {
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .list-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px var(--space-sm);
      background: var(--bg-input);
      cursor: pointer;
    }
    .list-item-header:hover { background: var(--bg-hover); }
    .list-item-title {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--text-primary);
    }
    .list-item-actions {
      display: flex;
      gap: var(--space-xs);
    }
    .list-item-actions button {
      padding: 2px 8px;
      background: transparent;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-size: var(--font-size-xs);
      cursor: pointer;
      min-height: 24px;
    }
    .list-item-actions button:hover { color: var(--text-primary); border-color: var(--border-active); }
    .list-item-actions button.remove:hover { color: var(--status-critical); border-color: var(--status-critical); }
    .list-item-body {
      padding: var(--space-sm);
      background: var(--bg-panel);
    }
    .list-item.collapsed .list-item-body { display: none; }
    .list-add-btn {
      padding: 6px var(--space-md);
      background: var(--bg-input);
      border: 1px dashed var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      width: 100%;
      text-align: center;
      min-height: 32px;
    }
    .list-add-btn:hover { border-color: var(--status-info); color: var(--status-info); }

    /* String list (simple arrays of strings) */
    .string-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }
    .string-list-row {
      display: flex;
      gap: var(--space-xs);
    }
    .string-list-row input { flex: 1; }
    .string-list-row button {
      padding: 2px 8px;
      background: transparent;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-size: var(--font-size-xs);
      cursor: pointer;
      min-height: auto;
    }
    .string-list-row button:hover { color: var(--status-critical); border-color: var(--status-critical); }

    /* Key-value pairs (power system_map) */
    .kv-list-row {
      display: flex;
      gap: var(--space-xs);
    }
    .kv-list-row input { flex: 1; }

    /* Multi-select chips */
    .chip-container {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      padding: var(--space-xs);
      background: var(--bg-input);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      min-height: 32px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: var(--bg-hover);
      border-radius: 10px;
      font-size: var(--font-size-xs);
      font-family: var(--font-mono);
      color: var(--text-primary);
    }
    .chip .chip-remove {
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.6rem;
      line-height: 1;
    }
    .chip .chip-remove:hover { color: var(--status-critical); }

    /* ================================================================
       RIGHT PANEL - Hardpoint Visualizer
       ================================================================ */
    #right-panel {
      width: var(--right-panel-width);
      min-width: var(--right-panel-width);
      background: var(--bg-panel);
      border-left: 1px solid var(--border-default);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #right-panel.visible { display: flex; }
    .viz-header {
      padding: var(--space-sm) var(--space-md);
      background: var(--bg-panel-raised);
      border-bottom: 1px solid var(--border-default);
    }
    .viz-title {
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }
    .viz-canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
      overflow: hidden;
    }
    #hardpoint-svg {
      background: var(--bg-void);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
    }
    .viz-legend {
      padding: var(--space-sm) var(--space-md);
      border-top: 1px solid var(--border-default);
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--font-size-xs);
      color: var(--text-secondary);
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .viz-controls {
      padding: var(--space-sm) var(--space-md);
      border-top: 1px solid var(--border-default);
      display: flex;
      gap: var(--space-sm);
      align-items: center;
    }
    .viz-controls label {
      font-size: var(--font-size-xs);
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }
    .viz-controls input[type="range"] {
      flex: 1;
      accent-color: var(--status-info);
    }

    /* ================================================================
       BOTTOM STATUS BAR
       ================================================================ */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px var(--space-md);
      background: var(--bg-panel);
      border-top: 1px solid var(--border-default);
      height: 28px;
      flex-shrink: 0;
      font-size: var(--font-size-xs);
      font-family: var(--font-mono);
      color: var(--text-dim);
    }
    #status-bar .validation-ok { color: var(--status-nominal); }
    #status-bar .validation-warn { color: var(--status-warning); }
    #status-bar .validation-err { color: var(--status-critical); }

    /* ================================================================
       TOAST NOTIFICATIONS
       ================================================================ */
    #toasts {
      position: fixed;
      top: 52px;
      right: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 360px;
    }
    .toast {
      padding: 10px 14px;
      background: var(--bg-panel);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      font-size: var(--font-size-sm);
      color: var(--text-primary);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      animation: toastIn 0.2s ease;
    }
    .toast.success { border-color: var(--status-nominal); }
    .toast.error { border-color: var(--status-critical); }
    .toast.warning { border-color: var(--status-warning); }
    .toast.info { border-color: var(--status-info); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ================================================================
       CONFIRM DIALOG
       ================================================================ */
    .dialog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .dialog-box {
      background: var(--bg-panel);
      border: 1px solid var(--border-active);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      max-width: 400px;
      width: 90%;
    }
    .dialog-box h3 {
      font-family: var(--font-mono);
      font-size: var(--font-size-base);
      color: var(--text-bright);
      margin-bottom: var(--space-sm);
    }
    .dialog-box p {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      margin-bottom: var(--space-md);
    }
    .dialog-buttons {
      display: flex;
      justify-content: flex-end;
      gap: var(--space-sm);
    }
    .dialog-buttons button {
      padding: 6px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--font-size-sm);
      font-weight: 600;
      cursor: pointer;
      min-height: 32px;
    }
    .dialog-buttons button:hover { background: var(--bg-hover); }

<script>
/* ================================================================
   FLAXOS ASSET EDITOR - Application Logic
   ================================================================ */

const API_BASE = 'http://localhost:3200';

// ----------------------------------------------------------------
// Utility helpers
// ----------------------------------------------------------------

function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}

function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

function deepEqual(a, b) {
  return JSON.stringify(a) === JSON.stringify(b);
}

/** Show a toast notification */
function toast(msg, type = 'info', duration = 3000) {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.remove(); }, duration);
}

/** Show a confirmation dialog, returns a promise resolving to true/false */
function confirmDialog(title, message, confirmLabel = 'Confirm', isDanger = false) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'dialog-overlay';
    overlay.innerHTML = `
      <div class="dialog-box">
        <h3>${title}</h3>
        <p>${message}</p>
        <div class="dialog-buttons">
          <button class="cancel-btn">Cancel</button>
          <button class="confirm-btn ${isDanger ? 'danger' : 'primary'}">${confirmLabel}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('.cancel-btn').onclick = () => { overlay.remove(); resolve(false); };
    overlay.querySelector('.confirm-btn').onclick = () => { overlay.remove(); resolve(true); };
    overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); resolve(false); } });
  });
}

// ----------------------------------------------------------------
// Ship class hull shapes for SVG visualizer (top-down outlines)
// Each shape is an array of [x, z] points centered at origin.
// ----------------------------------------------------------------
const HULL_SHAPES = {
  corvette:   [[ 0,-60],[ 20,-30],[ 25, 10],[ 18, 50],[ 0, 65],[-18, 50],[-25, 10],[-20,-30]],
  frigate:    [[ 0,-80],[ 22,-45],[ 28, 0],[ 25, 40],[ 18, 70],[ 0, 85],[-18, 70],[-25, 40],[-28, 0],[-22,-45]],
  destroyer:  [[ 0,-90],[ 30,-50],[ 35, 0],[ 30, 50],[ 20, 80],[ 0, 95],[-20, 80],[-30, 50],[-35, 0],[-30,-50]],
  cruiser:    [[ 0,-100],[ 35,-60],[ 42, 0],[ 38, 55],[ 25, 90],[ 0,105],[-25, 90],[-38, 55],[-42, 0],[-35,-60]],
  carrier:    [[ 0,-100],[ 45,-60],[ 50,-10],[ 50, 50],[ 40, 90],[ 0,105],[-40, 90],[-50, 50],[-50,-10],[-45,-60]],
  freighter:  [[ 0,-70],[ 30,-40],[ 35, 10],[ 35, 50],[ 25, 75],[ 0, 85],[-25, 75],[-35, 50],[-35, 10],[-30,-40]],
  probe:      [[ 0,-35],[ 10,-20],[ 12, 5],[ 8, 25],[ 0, 32],[-8, 25],[-12, 5],[-10,-20]],
  station:    [[ 40,-40],[ 40, 40],[-40, 40],[-40,-40]],
};

function getHullShape(shipClass) {
  return HULL_SHAPES[shipClass] || HULL_SHAPES.corvette;
}

// ----------------------------------------------------------------
// Default data templates
// ----------------------------------------------------------------

function defaultShip() {
  return {
    id: '',
    name: 'New Ship',
    class: 'corvette',
    faction: '',
    mass: 50.0,
    max_hull_integrity: 100,
    hull_integrity: 100,
    ai_enabled: false,
    position: { x: 0, y: 0, z: 0 },
    velocity: { x: 0, y: 0, z: 0 },
    orientation: { pitch: 0, yaw: 0, roll: 0 },
    systems: {
      propulsion: { enabled: true, power_draw: 10, mass: 5, max_thrust: 50 },
      rcs: { enabled: true, max_torque: 10, attitude_rate: 5 },
      sensors: {
        enabled: true, power_draw: 5,
        passive: { range: 1000 },
        active: { scan_range: 500, cooldown_time: 10 },
        signature_base: 100
      },
      targeting: { enabled: true, lock_time: 5, lock_range: 500 },
      combat: { enabled: true, railguns: 1, pdcs: 2 },
    },
    weapons: [],
    power_management: {
      primary: { output: 100 },
      secondary: { output: 50 },
      tertiary: { output: 25 },
      system_map: {}
    },
    damage_model: {
      subsystems: []
    },
    hardpoints: []
  };
}

function defaultScenario() {
  return {
    name: 'New Scenario',
    description: '',
    metadata: { author: '', version: '1.0', tags: [], difficulty: 'medium' },
    ships: [],
    objectives: [],
    win_conditions: { any_of: [] },
    fail_conditions: { any_of: [] },
    events: [],
    tactical_notes: {
      player_advantages: [],
      enemy_advantages: [],
      recommended_tactics: []
    }
  };
}

function defaultWeapon() {
  return { name: 'New Weapon', power_cost: 5, max_heat: 100, ammo: 50, damage: 25 };
}

function defaultSubsystem() {
  return { name: 'subsystem', max_health: 100, health: 100, criticality: 'normal', failure_threshold: 25 };
}

function defaultHardpoint() {
  return {
    id: 'hp_' + Date.now().toString(36),
    position: { x: 0, y: 0, z: 0 },
    mount_type: 'fixed',
    facing_arc: 30,

    assigned_weapon: ''
  };
}

    id: 'obj_' + Date.now().toString(36),

function defaultEvent() {
  return { time: 0, type: 'message', content: '' };
}


// ================================================================
// AssetEditor class - manages all application state
// ================================================================

class AssetEditor {
  constructor() {
    this.category = 'ships';       // 'ships' | 'scenarios'
    this.assets = [];              // list of {id, name, ...} for current category
    this.selectedId = null;
    this.originalData = null;      // snapshot at load time
    this.currentData = null;       // live editable data
    this.dirty = false;
    this.connected = false;
    this.lastSaveTime = null;
    this.validationStatus = '';
    this.vizScale = 5;             // pixels per game unit for hardpoint viz
    this.draggingHardpoint = null;  // index of hardpoint being dragged

    this.initDOM();
    this.bindEvents();
    this.checkConnection();
    this.loadAssets();
  }

  // ----------------------------------------------------------
  // DOM references
  // ----------------------------------------------------------
  initDOM() {
    this.dom = {
      categoryTabs: document.querySelectorAll('.category-tab'),
      searchInput: document.getElementById('search-input'),
      assetList: document.getElementById('asset-list'),
      btnNew: document.getElementById('btn-new'),
      btnDuplicate: document.getElementById('btn-duplicate'),
      btnDelete: document.getElementById('btn-delete'),
      editorToolbar: document.getElementById('editor-toolbar'),
      editorTitle: document.getElementById('editor-title'),
      dirtyDot: document.getElementById('dirty-dot'),
      btnSave: document.getElementById('btn-save'),
      btnDiscard: document.getElementById('btn-discard'),
      btnValidate: document.getElementById('btn-validate'),
      editorForm: document.getElementById('editor-form'),
      editorEmpty: document.getElementById('editor-empty'),
      rightPanel: document.getElementById('right-panel'),
      hardpointSvg: document.getElementById('hardpoint-svg'),
      vizScale: document.getElementById('viz-scale'),
      vizScaleLabel: document.getElementById('viz-scale-label'),
      connDot: document.getElementById('conn-dot'),
      connLabel: document.getElementById('conn-label'),
      statusLeft: document.getElementById('status-left'),
      statusCenter: document.getElementById('status-center'),
      statusRight: document.getElementById('status-right'),
    };
  }

  // ----------------------------------------------------------
  // Event binding
  // ----------------------------------------------------------
  bindEvents() {
    // Category tabs
    this.dom.categoryTabs.forEach(tab => {
      tab.addEventListener('click', () => this.switchCategory(tab.dataset.category));
    });

    // Search
    this.dom.searchInput.addEventListener('input', () => this.renderAssetList());

    // Sidebar buttons
    this.dom.btnNew.addEventListener('click', () => this.createNew());
    this.dom.btnDuplicate.addEventListener('click', () => this.duplicateSelected());
    this.dom.btnDelete.addEventListener('click', () => this.deleteSelected());

    // Editor toolbar
    this.dom.btnSave.addEventListener('click', () => this.save());
    this.dom.btnDiscard.addEventListener('click', () => this.discard());
    this.dom.btnValidate.addEventListener('click', () => this.validate());

    // Viz scale slider
    this.dom.vizScale.addEventListener('input', (e) => {
      this.vizScale = parseInt(e.target.value);
      this.dom.vizScaleLabel.textContent = `${this.vizScale} px/u`;
      this.renderHardpointViz();
    });

    // SVG drag for hardpoints
    this.dom.hardpointSvg.addEventListener('mousedown', (e) => this.onSvgMouseDown(e));
    document.addEventListener('mousemove', (e) => this.onSvgMouseMove(e));
    document.addEventListener('mouseup', () => this.onSvgMouseUp());

    // Warn before leaving with unsaved changes
    window.addEventListener('beforeunload', (e) => {
      if (this.dirty) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // Periodic connection check
    setInterval(() => this.checkConnection(), 15000);
  }

  // ----------------------------------------------------------
  // API helpers
  // ----------------------------------------------------------
  async api(method, path, body = null) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' },
    };
    if (body !== null) opts.body = JSON.stringify(body);
    try {
      const resp = await fetch(`${API_BASE}${path}`, opts);
      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(`${resp.status}: ${text}`);
      }
      const ct = resp.headers.get('content-type') || '';
      if (ct.includes('application/json')) return await resp.json();
      return null;
    } catch (err) {
      if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
        this.setConnected(false);
      }
      throw err;
    }
  }

  async checkConnection() {
    try {
      await fetch(`${API_BASE}/api/ships`, { method: 'HEAD', mode: 'cors' });
      this.setConnected(true);
    } catch {
      // Try a GET as fallback (HEAD might not be supported)
      try {
        await this.api('GET', `/api/${this.category}`);
        this.setConnected(true);
      } catch {
        this.setConnected(false);
      }
    }
  }

  setConnected(val) {
    this.connected = val;
    this.dom.connDot.className = 'conn-dot ' + (val ? 'connected' : 'error');
    this.dom.connLabel.textContent = val ? 'CONNECTED' : 'OFFLINE';
  }

  // ----------------------------------------------------------
  // Category switching
  // ----------------------------------------------------------
  async switchCategory(cat) {
    if (cat === this.category && this.assets.length > 0) return;
    if (this.dirty) {
      const proceed = await confirmDialog('Unsaved Changes', 'You have unsaved changes. Discard them?', 'Discard', true);
      if (!proceed) return;
    }
    this.category = cat;
    this.dom.categoryTabs.forEach(t => t.classList.toggle('active', t.dataset.category === cat));
    this.selectedId = null;
    this.clearEditor();
    await this.loadAssets();
  }

  // ----------------------------------------------------------
  // Asset loading
  // ----------------------------------------------------------
  async loadAssets() {
    try {
      this.assets = await this.api('GET', `/api/${this.category}`);
      this.renderAssetList();
      this.updateStatusBar();
    } catch (err) {
      // If the API is unreachable, show empty state
      this.assets = [];
      this.renderAssetList();
      this.updateStatusBar();
    }
  }

  renderAssetList() {
    const filter = this.dom.searchInput.value.toLowerCase();
    const filtered = this.assets.filter(a => {
      const name = (a.name || a.id || '').toLowerCase();
      const meta = (a.class || a.description || '').toLowerCase();
      return name.includes(filter) || meta.includes(filter);
    });

    this.dom.assetList.innerHTML = '';
    for (const asset of filtered) {
      const el = document.createElement('div');
      el.className = 'asset-item' + (asset.id === this.selectedId ? ' selected' : '');
      const metaText = this.category === 'ships'
        ? `${asset.class || '?'} / ${asset.faction || '?'}`
        : (asset.description || '').substring(0, 40);
      el.innerHTML = `
        <div class="asset-item-name">${asset.name || asset.id || 'Unnamed'}</div>
        <div class="asset-item-meta">${metaText}</div>
      `;
      el.addEventListener('click', () => this.selectAsset(asset.id));
      this.dom.assetList.appendChild(el);
    }
  }

  // ----------------------------------------------------------
  // Asset selection
  // ----------------------------------------------------------
  async selectAsset(id) {
    if (id === this.selectedId) return;
    if (this.dirty) {
      const proceed = await confirmDialog('Unsaved Changes', 'Discard unsaved changes to the current asset?', 'Discard', true);
      if (!proceed) return;
    }
    this.selectedId = id;
    this.renderAssetList();

    try {
      const data = await this.api('GET', `/api/${this.category}/${id}`);
      this.originalData = deepClone(data);
      this.currentData = deepClone(data);
      this.dirty = false;
      this.renderEditor();
    } catch (err) {
      toast('Failed to load asset: ' + err.message, 'error');
    }
  }

  // ----------------------------------------------------------
  // Editor rendering
  // ----------------------------------------------------------
  clearEditor() {
    this.currentData = null;
    this.originalData = null;
    this.dirty = false;
    this.dom.editorToolbar.style.display = 'none';
    this.dom.editorForm.style.display = 'none';
    this.dom.editorEmpty.style.display = 'flex';
    this.dom.rightPanel.classList.remove('visible');
    this.updateDirtyIndicator();
  }

  renderEditor() {
    if (!this.currentData) { this.clearEditor(); return; }

    this.dom.editorToolbar.style.display = 'flex';
    this.dom.editorForm.style.display = 'block';
    this.dom.editorEmpty.style.display = 'none';
    this.dom.editorTitle.textContent = this.currentData.name || this.currentData.id || 'Untitled';
    this.updateDirtyIndicator();

    if (this.category === 'ships') {
      this.renderShipForm();
      this.dom.rightPanel.classList.add('visible');
      this.renderHardpointViz();
    } else {
      this.renderScenarioForm();
      this.dom.rightPanel.classList.remove('visible');
    }
  }

  updateDirtyIndicator() {
    this.dirty = this.currentData && this.originalData && !deepEqual(this.currentData, this.originalData);
    this.dom.dirtyDot.classList.toggle('visible', this.dirty);
    this.dom.btnSave.disabled = !this.dirty;
    this.dom.btnDiscard.disabled = !this.dirty;
  }

  /** Helper: build a collapsible section */
  section(title, content, collapsed = false) {
    return `<div class="form-section ${collapsed ? 'collapsed' : ''}">
      <div class="form-section-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="form-section-title">${title}</span>
        <span class="form-section-toggle">&#9660;</span>
      </div>
      <div class="form-section-body">${content}</div>
    </div>`;
  }

  /** Helper: single form field */
  field(label, inputHtml, fullWidth = false) {
    return `<div class="form-field ${fullWidth ? 'full-width' : ''}">
      <label>${label}</label>
      ${inputHtml}
    </div>`;
  }

  /** Helper: text input bound to data path */
  textInput(path, placeholder = '', readonly = false) {
    const val = this.getPath(path);
    return `<input type="text" data-path="${path}" value="${this.escAttr(val || '')}" placeholder="${placeholder}" ${readonly ? 'readonly' : ''}>`;
  }

  /** Helper: number input */
  numberInput(path, step = '1', min = '', max = '') {
    const val = this.getPath(path);
    return `<input type="number" data-path="${path}" value="${val != null ? val : ''}" step="${step}" ${min !== '' ? 'min="'+min+'"' : ''} ${max !== '' ? 'max="'+max+'"' : ''}>`;
  }

  /** Helper: select */
  selectInput(path, options) {
    const val = this.getPath(path);
    const opts = options.map(o => {
      const v = typeof o === 'string' ? o : o.value;
      const l = typeof o === 'string' ? o : o.label;
      return `<option value="${v}" ${v === val ? 'selected' : ''}>${l}</option>`;
    }).join('');
    return `<select data-path="${path}">${opts}</select>`;
  }

  /** Helper: checkbox */
  checkboxInput(path, label) {
    const val = this.getPath(path);
    return `<div class="checkbox-row">
      <input type="checkbox" data-path="${path}" ${val ? 'checked' : ''} id="cb_${path.replace(/\./g,'_')}">
      <label for="cb_${path.replace(/\./g,'_')}">${label}</label>
    </div>`;
  }

  /** Helper: 3D vector input */
  vectorInput(pathPrefix, labels = ['X', 'Y', 'Z']) {
    const keys = labels.map(l => l.toLowerCase());
    return `<div>
      <div class="vector-label">${labels.map(l => `<span>${l}</span>`).join('')}</div>
      <div class="vector-group">
        ${keys.map(k => `<input type="number" data-path="${pathPrefix}.${k}" value="${this.getPath(pathPrefix + '.' + k) || 0}" step="0.1">`).join('')}
      </div>
    </div>`;
  }

  escAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Navigate nested object by dot-separated path
  getPath(path) {
    return path.split('.').reduce((o, k) => (o != null ? o[k] : undefined), this.currentData);
  }

  setPath(path, value) {
    const parts = path.split('.');
    let obj = this.currentData;
    for (let i = 0; i < parts.length - 1; i++) {
      if (obj[parts[i]] == null) obj[parts[i]] = {};
      obj = obj[parts[i]];
    }
    obj[parts[parts.length - 1]] = value;
  }

  // ----------------------------------------------------------
  // SHIP FORM
  // ----------------------------------------------------------
  renderShipForm() {
    const d = this.currentData;
    // Ensure nested structures exist
    if (!d.systems) d.systems = {};
    if (!d.systems.propulsion) d.systems.propulsion = { enabled: true, power_draw: 0, mass: 0, max_thrust: 0 };
    if (!d.systems.rcs) d.systems.rcs = { enabled: true, max_torque: 0, attitude_rate: 0 };
    if (!d.systems.sensors) d.systems.sensors = { enabled: true, power_draw: 0, passive: { range: 0 }, active: { scan_range: 0, cooldown_time: 0 }, signature_base: 0 };
    if (!d.systems.targeting) d.systems.targeting = { enabled: true, lock_time: 0, lock_range: 0 };
    if (!d.systems.combat) d.systems.combat = { enabled: true, railguns: 0, pdcs: 0 };
    if (!d.weapons) d.weapons = [];
    if (!d.power_management) d.power_management = { primary: { output: 0 }, secondary: { output: 0 }, tertiary: { output: 0 }, system_map: {} };
    if (!d.damage_model) d.damage_model = { subsystems: [] };
    if (!d.hardpoints) d.hardpoints = [];
    if (!d.position) d.position = { x: 0, y: 0, z: 0 };
    if (!d.velocity) d.velocity = { x: 0, y: 0, z: 0 };
    if (!d.orientation) d.orientation = { pitch: 0, yaw: 0, roll: 0 };

    const isNew = !this.originalData.id;

    const html = [
      // Basic Info
      this.section('Basic Info', `
        <div class="form-grid">
          ${this.field('ID', this.textInput('id', 'unique_id', !isNew))}
          ${this.field('Name', this.textInput('name', 'Ship Name'))}
          ${this.field('Class', this.selectInput('class', ['corvette','frigate','destroyer','cruiser','carrier','probe','freighter','station']))}
          ${this.field('Faction', this.textInput('faction', 'UNE, MCRN, etc.'))}
          ${this.field('Mass', this.numberInput('mass', '0.1', '0'))}
          ${this.field('Max Hull', this.numberInput('max_hull_integrity', '1', '0'))}
          ${this.field('Hull', this.numberInput('hull_integrity', '1', '0'))}
          ${this.field('AI', this.checkboxInput('ai_enabled', 'AI Enabled'))}
        </div>
      `),

      // Position / Velocity / Orientation

  renderKVList(basePath) {
    const map = this.getPath(basePath) || {};

    entries.forEach(([k, v], i) => {
      html += `<div class="kv-list-row">

  // Chip-style multi-select
  renderChipInput(path, current, options) {
    const currentSet = new Set(current);
    let html = `<div class="chip-container" data-chip-path="${path}">`;
    for (const c of current) {
      html += `<span class="chip">${c}<span class="chip-remove" data-action="remove-chip" data-chip-path="${path}" data-chip-value="${c}">x</span></span>`;
    }
    html += '</div>';
    // Add dropdown
    const available = options.filter(o => !currentSet.has(o));
    if (available.length > 0) {
      html += `<select data-action="add-chip" data-chip-path="${path}" style="margin-top:4px;width:100%;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border-default);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-mono);font-size:var(--font-size-xs);">
        <option value="">+ add class...</option>
        ${available.map(o => `<option value="${o}">${o}</option>`).join('')}
      </select>`;
    }
    return html;
  }

  // Inline select helper (not bound via data-path, uses direct value)
  makeSelect(path, options, current) {
    const opts = options.map(o => `<option value="${o}" ${o === current ? 'selected' : ''}>${o}</option>`).join('');
    return `<select data-path="${path}">${opts}</select>`;
  }

  // ----------------------------------------------------------
  // Form input binding (delegation)
  // ----------------------------------------------------------
  bindFormInputs() {
    const form = this.dom.editorForm;

    // Debounced auto-validate
    const debouncedValidate = debounce(() => this.autoValidate(), 800);

    // Input change handler using event delegation
    form.addEventListener('input', (e) => {
      const el = e.target;
      this.handleInputChange(el);
      debouncedValidate();
    });

    form.addEventListener('change', (e) => {
      const el = e.target;
      this.handleInputChange(el);

      // Handle chip add-dropdown
      if (el.dataset.action === 'add-chip') {
        const val = el.value;
        if (!val) return;
        const path = el.dataset.chipPath;
        const arr = this.getPath(path) || [];
        if (!arr.includes(val)) {
          arr.push(val);
          this.setPath(path, arr);
        }
        this.renderEditor();
        return;
      }

      debouncedValidate();
    });

    // Click handler for add/remove buttons
    form.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;

      switch (action) {
        case 'add-weapon':
          this.currentData.weapons.push(defaultWeapon());
          this.renderEditor();
          break;
        case 'remove-weapon':
          this.currentData.weapons.splice(parseInt(btn.dataset.index), 1);
          this.renderEditor();
          break;
        case 'add-subsystem':
          this.currentData.damage_model.subsystems.push(defaultSubsystem());
          this.renderEditor();
          break;
        case 'remove-subsystem':
          this.currentData.damage_model.subsystems.splice(parseInt(btn.dataset.index), 1);
          this.renderEditor();
          break;
        case 'add-hardpoint':
          this.currentData.hardpoints.push(defaultHardpoint());
          this.renderEditor();
          break;
        case 'remove-hardpoint':
          this.currentData.hardpoints.splice(parseInt(btn.dataset.index), 1);
          this.renderEditor();
          break;
        case 'add-scenario-ship':
          this.currentData.ships.push({ id: 'ship_' + Date.now().toString(36), name: 'New Ship', class: 'corvette', faction: '', ai_enabled: false });
          this.renderEditor();
          break;
        case 'remove-scenario-ship':
          this.currentData.ships.splice(parseInt(btn.dataset.index), 1);
          this.renderEditor();
          break;
        case 'add-objective':
          this.currentData.objectives.push(defaultObjective());
          this.renderEditor();
          break;
        case 'remove-objective':
          this.currentData.objectives.splice(parseInt(btn.dataset.index), 1);
          this.renderEditor();
          break;
        case 'add-event':
          this.currentData.events.push(defaultEvent());
          this.renderEditor();
          break;
        case 'remove-event':
          this.currentData.events.splice(parseInt(btn.dataset.index), 1);
          this.renderEditor();
          break;
        case 'add-string': {
          const path = btn.dataset.stringList;
          const arr = this.getPath(path) || [];
          arr.push('');
          this.setPath(path, arr);
          this.renderEditor();
          break;
        }
        case 'remove-string': {
          const path = btn.dataset.stringList;
          const arr = this.getPath(path) || [];
          arr.splice(parseInt(btn.dataset.index), 1);
          this.setPath(path, arr);
          this.renderEditor();
          break;
        }
        case 'remove-chip': {
          const path = btn.dataset.chipPath;
          const val = btn.dataset.chipValue;
          const arr = this.getPath(path) || [];
          const idx = arr.indexOf(val);
          if (idx >= 0) arr.splice(idx, 1);
          this.setPath(path, arr);
          this.renderEditor();
          break;
        }
        case 'add-kv': {
          const path = btn.dataset.kvPath;
          const map = this.getPath(path) || {};
          let newKey = 'key';
          let n = 1;
          while (map[newKey]) { newKey = 'key_' + n; n++; }
          map[newKey] = '';
          this.setPath(path, map);
          this.renderEditor();
          break;
        }
        case 'remove-kv': {
          const path = btn.dataset.kvPath;
          const key = btn.dataset.kvKey;
          const map = this.getPath(path) || {};
          delete map[key];
          this.setPath(path, map);
          this.renderEditor();
          break;
        }
      }
    });
  }

  handleInputChange(el) {
    // Standard data-path bound inputs
    if (el.dataset.path) {
      const path = el.dataset.path;
      let val;
      if (el.type === 'checkbox') {
        val = el.checked;
      } else if (el.type === 'number') {
        val = el.value === '' ? 0 : parseFloat(el.value);
      } else if (el.dataset.type === 'csv') {
        // Comma-separated to array
        val = el.value.split(',').map(s => s.trim()).filter(s => s.length > 0);
      } else {
        val = el.value;
      }
      this.setPath(path, val);
      this.updateDirtyIndicator();

      // Update title live
      if (path === 'name') {
        this.dom.editorTitle.textContent = val || 'Untitled';
      }
      // Update ship class -> redraw viz hull
      if (path === 'class' && this.category === 'ships') {
        this.renderHardpointViz();
      }
      // Update hardpoint positions -> redraw viz
      if (path.startsWith('hardpoints.') && this.category === 'ships') {
        this.renderHardpointViz();
      }
      return;
    }

    // String list inputs
    if (el.dataset.stringList) {
      const path = el.dataset.stringList;
      const arr = this.getPath(path) || [];
      arr[parseInt(el.dataset.index)] = el.value;
      this.setPath(path, arr);
      this.updateDirtyIndicator();
      return;
    }

    // KV key change
    if (el.dataset.kvKey !== undefined && el.dataset.kvOldKey !== undefined) {
      const basePath = el.dataset.kvKey;
      const oldKey = el.dataset.kvOldKey;
      const newKey = el.value;
      if (oldKey !== newKey) {
        const map = this.getPath(basePath) || {};
        const val = map[oldKey];
        delete map[oldKey];
        map[newKey] = val;
        this.setPath(basePath, map);
        el.dataset.kvOldKey = newKey;
        this.updateDirtyIndicator();
      }
      return;
    }

    // KV value change
    if (el.dataset.kvVal !== undefined) {
      const basePath = el.dataset.kvVal;
      const key = el.dataset.kvKeyRef;
      const map = this.getPath(basePath) || {};
      map[key] = el.value;
      this.setPath(basePath, map);
      this.updateDirtyIndicator();
      return;
    }
  }

  // ----------------------------------------------------------
  // CRUD operations
  // ----------------------------------------------------------
  async createNew() {
    if (this.dirty) {
      const proceed = await confirmDialog('Unsaved Changes', 'Discard current changes?', 'Discard', true);
      if (!proceed) return;
    }

    const data = this.category === 'ships' ? defaultShip() : defaultScenario();
    // Generate a temporary ID
    data.id = this.category.slice(0, -1) + '_' + Date.now().toString(36);
    if (data.name === undefined) data.name = 'New ' + (this.category === 'ships' ? 'Ship' : 'Scenario');

    try {
      const created = await this.api('POST', `/api/${this.category}`, data);
      toast('Created new ' + this.category.slice(0, -1), 'success');
      await this.loadAssets();
      const newId = created?.id || data.id;
      this.selectedId = newId;
      this.originalData = deepClone(data);
      this.currentData = deepClone(data);
      // Try to re-fetch to get the server-canonical version
      try {
        const fresh = await this.api('GET', `/api/${this.category}/${newId}`);
        this.originalData = deepClone(fresh);
        this.currentData = deepClone(fresh);
      } catch { /* use local copy */ }
      this.dirty = false;
      this.renderAssetList();
      this.renderEditor();
    } catch (err) {
      // If server is offline, edit locally
      this.originalData = deepClone(data);
      this.currentData = deepClone(data);
      this.selectedId = data.id;
      this.dirty = true;
      this.assets.push({ id: data.id, name: data.name, class: data.class });
      this.renderAssetList();
      this.renderEditor();
      toast('Working offline - save when connected', 'warning');
    }
  }

  async duplicateSelected() {
    if (!this.selectedId) { toast('Select an asset first', 'warning'); return; }
    try {
      const result = await this.api('POST', `/api/${this.category}/${this.selectedId}/duplicate`);
      toast('Duplicated successfully', 'success');
      await this.loadAssets();
      if (result?.id) {
        await this.selectAsset(result.id);
      }
    } catch (err) {
      toast('Duplicate failed: ' + err.message, 'error');
    }
  }

  async deleteSelected() {
    if (!this.selectedId) { toast('Select an asset first', 'warning'); return; }

    // Check for references
    let refWarning = '';
    try {
      const refs = await this.api('GET', `/api/refs/${this.selectedId}`);
      if (refs && refs.length > 0) {
        refWarning = ` This asset is referenced by: ${refs.map(r => r.name || r.id).join(', ')}.`;
      }
    } catch { /* no ref check available */ }

    const proceed = await confirmDialog(
      'Delete Asset',
      `Are you sure you want to delete "${this.currentData?.name || this.selectedId}"?${refWarning} This cannot be undone.`,
      'Delete',
      true
    );
    if (!proceed) return;

    try {
      await this.api('DELETE', `/api/${this.category}/${this.selectedId}`);
      toast('Deleted', 'success');
      this.selectedId = null;
      this.clearEditor();
      await this.loadAssets();
    } catch (err) {
      toast('Delete failed: ' + err.message, 'error');
    }
  }

  async save() {
    if (!this.currentData || !this.dirty) return;
    try {
      const id = this.originalData.id || this.currentData.id;
      if (id && this.assets.some(a => a.id === id)) {
        await this.api('PUT', `/api/${this.category}/${id}`, this.currentData);
      } else {
        await this.api('POST', `/api/${this.category}`, this.currentData);
      }
      this.originalData = deepClone(this.currentData);
      this.dirty = false;
      this.lastSaveTime = new Date();
      this.updateDirtyIndicator();
      this.updateStatusBar();
      await this.loadAssets();
      toast('Saved successfully', 'success');
    } catch (err) {
      toast('Save failed: ' + err.message, 'error');
    }
  }

  discard() {
    if (!this.originalData) return;
    this.currentData = deepClone(this.originalData);
    this.dirty = false;
    this.renderEditor();
    toast('Changes discarded', 'info');
  }

  async validate() {
    if (!this.currentData) return;
    if (this.category !== 'ships') {
      // No scenario validation endpoint specified, but we can do basic checks
      const errors = [];
      if (!this.currentData.name) errors.push('Name is required');
      if (!this.currentData.objectives || this.currentData.objectives.length === 0) errors.push('At least one objective recommended');
      if (errors.length > 0) {
        this.validationStatus = errors.join('; ');
        this.dom.statusCenter.className = 'validation-warn';
        this.dom.statusCenter.textContent = 'Warnings: ' + errors.length;
        toast('Validation warnings: ' + errors.join(', '), 'warning');
      } else {
        this.validationStatus = 'Valid';
        this.dom.statusCenter.className = 'validation-ok';
        this.dom.statusCenter.textContent = 'Valid';
        toast('Scenario looks good', 'success');
      }
      return;
    }
    try {
      const result = await this.api('POST', '/api/validate/ship', this.currentData);
      if (result && result.valid) {
        this.validationStatus = 'Valid';
        this.dom.statusCenter.className = 'validation-ok';
        this.dom.statusCenter.textContent = 'Valid';
        toast('Ship definition is valid', 'success');
      } else {
        const errors = result?.errors || ['Unknown validation error'];
        this.validationStatus = errors.join('; ');
        this.dom.statusCenter.className = 'validation-err';
        this.dom.statusCenter.textContent = `Errors: ${errors.length}`;
        toast('Validation errors: ' + errors.join(', '), 'error', 5000);
      }
    } catch (err) {
      toast('Validation request failed: ' + err.message, 'error');
    }
  }

  async autoValidate() {
    // Lightweight auto-validation on change (debounced)
    if (!this.currentData || this.category !== 'ships') return;
    const errors = [];
    if (!this.currentData.id) errors.push('ID required');
    if (!this.currentData.name) errors.push('Name required');
    if ((this.currentData.mass || 0) <= 0) errors.push('Mass must be > 0');
    if ((this.currentData.hull_integrity || 0) > (this.currentData.max_hull_integrity || 0)) errors.push('Hull > Max Hull');

    if (errors.length > 0) {
      this.dom.statusCenter.className = 'validation-warn';
      this.dom.statusCenter.textContent = 'Issues: ' + errors.length;
    } else {
      this.dom.statusCenter.className = 'validation-ok';
      this.dom.statusCenter.textContent = 'OK';
    }
  }

  updateStatusBar() {
    // Left: last save
    if (this.lastSaveTime) {
      this.dom.statusLeft.textContent = 'Last saved: ' + this.lastSaveTime.toLocaleTimeString();
    } else {
      this.dom.statusLeft.textContent = 'Ready';
    }
    // Right: asset count
    this.dom.statusRight.textContent = `${this.assets.length} ${this.category}`;
  }

  // ----------------------------------------------------------
  // HARDPOINT VISUALIZER (SVG)
  // ----------------------------------------------------------
  renderHardpointViz() {
    if (this.category !== 'ships' || !this.currentData) return;

    const svg = this.dom.hardpointSvg;
    const scale = this.vizScale;
    const shipClass = this.currentData.class || 'corvette';
    const hullPoints = getHullShape(shipClass);
    const hardpoints = this.currentData.hardpoints || [];

    // Clear SVG
    svg.innerHTML = '';

    // Draw grid lines
    const gridGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    gridGroup.setAttribute('stroke', '#1a1a24');
    gridGroup.setAttribute('stroke-width', '0.5');
    for (let x = -140; x <= 140; x += 20) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x); line.setAttribute('y1', -190);
      line.setAttribute('x2', x); line.setAttribute('y2', 190);
      gridGroup.appendChild(line);
    }
    for (let y = -190; y <= 190; y += 20) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', -140); line.setAttribute('y1', y);
      line.setAttribute('x2', 140); line.setAttribute('y2', y);
      gridGroup.appendChild(line);
    }
    svg.appendChild(gridGroup);

    // Center crosshair
    const ch = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    ch.setAttribute('stroke', '#2a2a3a');
    ch.setAttribute('stroke-width', '1');
    const lh = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    lh.setAttribute('x1', -140); lh.setAttribute('y1', 0);
    lh.setAttribute('x2', 140); lh.setAttribute('y2', 0);
    ch.appendChild(lh);
    const lv = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    lv.setAttribute('x1', 0); lv.setAttribute('y1', -190);
    lv.setAttribute('x2', 0); lv.setAttribute('y2', 190);
    ch.appendChild(lv);
    svg.appendChild(ch);

    // Draw hull
    const hullPath = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    const pts = hullPoints.map(([x, z]) => `${x},${z}`).join(' ');
    hullPath.setAttribute('points', pts);
    hullPath.setAttribute('fill', 'rgba(34, 34, 46, 0.6)');
    hullPath.setAttribute('stroke', '#3a3a4a');
    hullPath.setAttribute('stroke-width', '1.5');
    svg.appendChild(hullPath);

    // Forward indicator (top = forward)
    const fwd = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    fwd.setAttribute('x', 0); fwd.setAttribute('y', -185);
    fwd.setAttribute('text-anchor', 'middle');
    fwd.setAttribute('fill', '#555566');
    fwd.setAttribute('font-size', '9');
    fwd.setAttribute('font-family', 'JetBrains Mono, monospace');
    fwd.textContent = 'FWD';
    svg.appendChild(fwd);

    // Detect arc overlaps for conflict coloring
    const arcData = hardpoints.map((hp, i) => {
      const pos = hp.position || { x: 0, y: 0, z: 0 };
      const arc = hp.facing_arc || 30;
      // Determine facing angle from position (assumes forward is -Z i.e. up in SVG)
      // Simple heuristic: point outward from center
      let angle = Math.atan2(pos.x, -(pos.z || 0)) * (180 / Math.PI);
      return { index: i, cx: pos.x * scale, cz: (pos.z || 0) * scale, arc, angle, type: hp.mount_type };
    });

    // Simple overlap detection: check if any two arcs share angular space
    // within a threshold distance of each other
    const conflicts = new Set();
    for (let i = 0; i < arcData.length; i++) {
      for (let j = i + 1; j < arcData.length; j++) {
        const a = arcData[i], b = arcData[j];
        const dist = Math.sqrt((a.cx - b.cx) ** 2 + (a.cz - b.cz) ** 2);
        if (dist < 30) {
          const angleDiff = Math.abs(a.angle - b.angle);
          const overlap = (a.arc / 2 + b.arc / 2);
          if (angleDiff < overlap || (360 - angleDiff) < overlap) {
            conflicts.add(i);
            conflicts.add(j);
          }
        }
      }
    }

    // Draw firing arcs
    hardpoints.forEach((hp, i) => {
      const pos = hp.position || { x: 0, y: 0, z: 0 };
      const cx = pos.x * scale;
      const cz = (pos.z || 0) * scale;
      const arcDeg = hp.facing_arc || 30;
      const radius = 40;

      // Determine base color
      let color;
      if (conflicts.has(i)) {
        color = 'rgba(255, 170, 0, 0.15)';
      } else if (hp.mount_type === 'turret') {
        color = 'rgba(0, 170, 255, 0.12)';
      } else if (hp.mount_type === 'gimbal') {
        color = 'rgba(0, 255, 136, 0.12)';
      } else {
        color = 'rgba(255, 68, 68, 0.12)';
      }

      // Calculate arc facing (outward from center)
      let facingAngle = Math.atan2(cx, -cz);
      if (cx === 0 && cz === 0) facingAngle = -Math.PI / 2; // default forward

      const startAngle = facingAngle - (arcDeg / 2) * Math.PI / 180;
      const endAngle = facingAngle + (arcDeg / 2) * Math.PI / 180;

      const x1 = cx + radius * Math.sin(startAngle);
      const y1 = cz - radius * Math.cos(startAngle);
      const x2 = cx + radius * Math.sin(endAngle);
      const y2 = cz - radius * Math.cos(endAngle);

      const largeArc = arcDeg > 180 ? 1 : 0;

      const arcPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      arcPath.setAttribute('d', `M ${cx} ${cz} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`);
      arcPath.setAttribute('fill', color);
      arcPath.setAttribute('stroke', conflicts.has(i) ? '#ffaa00' : 'transparent');
      arcPath.setAttribute('stroke-width', '0.5');
      svg.appendChild(arcPath);
    });

    // Draw hardpoint dots
    hardpoints.forEach((hp, i) => {
      const pos = hp.position || { x: 0, y: 0, z: 0 };
      const cx = pos.x * scale;
      const cz = (pos.z || 0) * scale;

      // Color by type
      let fill;
      if (hp.mount_type === 'turret') fill = '#00aaff';
      else if (hp.mount_type === 'gimbal') fill = '#00ff88';
      else fill = '#ff4444';

      // Check if it has sensor-class compatibility
      if ((hp.compatible_classes || []).includes('sensor')) fill = '#00ff88';

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', cx);
      circle.setAttribute('cy', cz);
      circle.setAttribute('r', 6);
      circle.setAttribute('fill', fill);
      circle.setAttribute('stroke', '#ffffff');
      circle.setAttribute('stroke-width', '1');
      circle.setAttribute('data-hp-index', i);
      circle.style.cursor = 'grab';
      svg.appendChild(circle);

      // Label
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', cx);
      label.setAttribute('y', cz + 16);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('fill', '#888899');
      label.setAttribute('font-size', '7');
      label.setAttribute('font-family', 'JetBrains Mono, monospace');
      label.textContent = hp.id || 'hp' + i;
      svg.appendChild(label);
    });
  }

  // SVG drag handlers for repositioning hardpoints
  onSvgMouseDown(e) {
    const circle = e.target.closest('circle[data-hp-index]');
    if (!circle) return;
    this.draggingHardpoint = parseInt(circle.dataset.hpIndex);
    circle.style.cursor = 'grabbing';
    e.preventDefault();
  }

  onSvgMouseMove(e) {
    if (this.draggingHardpoint === null) return;
    const svg = this.dom.hardpointSvg;
    const rect = svg.getBoundingClientRect();
    // Convert screen coords to SVG viewBox coords
    const svgX = ((e.clientX - rect.left) / rect.width) * 300 - 150;
    const svgZ = ((e.clientY - rect.top) / rect.height) * 400 - 200;
    const scale = this.vizScale;

    const hp = this.currentData.hardpoints[this.draggingHardpoint];
    if (!hp) return;
    if (!hp.position) hp.position = { x: 0, y: 0, z: 0 };
    hp.position.x = Math.round((svgX / scale) * 10) / 10;
    hp.position.z = Math.round((svgZ / scale) * 10) / 10;

    this.renderHardpointViz();
    this.updateDirtyIndicator();

    // Also update the form inputs if visible
    const xInput = this.dom.editorForm.querySelector(`[data-path="hardpoints.${this.draggingHardpoint}.position.x"]`);
    const zInput = this.dom.editorForm.querySelector(`[data-path="hardpoints.${this.draggingHardpoint}.position.z"]`);
    if (xInput) xInput.value = hp.position.x;
    if (zInput) zInput.value = hp.position.z;
  }

  onSvgMouseUp() {
    this.draggingHardpoint = null;
  }
}

// ================================================================
// Initialize on DOM ready
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  window.editor = new AssetEditor();
});
</script>

</body>
</html>
